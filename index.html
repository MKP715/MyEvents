<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#2E7D32" />
<title>AA Events Calendar</title>
<style>
  /* ============================================================
     Open-source vanilla CSS. Mobile-first, dark-mode aware.
     ============================================================ */
  :root {
    --bg:           #f5f7fa;
    --surface:      #ffffff;
    --surface-alt:  #f1f5f9;
    --text:         #0f172a;
    --text-muted:   #64748b;
    --border:       #e2e8f0;
    --primary:      #2E7D32;
    --primary-ink:  #ffffff;
    --danger:       #dc2626;
    --warning:      #f59e0b;
    --radius-sm:    8px;
    --radius:       14px;
    --radius-lg:    20px;
    --shadow-sm:    0 1px 2px rgba(15,23,42,.06);
    --shadow:       0 4px 12px rgba(15,23,42,.08);
    --shadow-lg:    0 20px 40px rgba(15,23,42,.18);
    --safe-bottom:  env(safe-area-inset-bottom, 0px);
    --safe-top:     env(safe-area-inset-top, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #0b1220;
      --surface:     #111a2e;
      --surface-alt: #1a2540;
      --text:        #e2e8f0;
      --text-muted:  #94a3b8;
      --border:      #25324f;
      --shadow-sm:   0 1px 2px rgba(0,0,0,.4);
      --shadow:      0 6px 18px rgba(0,0,0,.5);
      --shadow-lg:   0 20px 40px rgba(0,0,0,.6);
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
  }

  button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  input, select { font: inherit; color: inherit; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ---------- App shell ---------- */
  .app {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-sm);
  }
  .topbar h1 {
    font-size: 1.05rem;
    font-weight: 700;
    margin: 0;
    flex: 1;
    letter-spacing: -0.01em;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .topbar .brand-icon {
    width: 22px; height: 22px;
    color: var(--primary);
    flex-shrink: 0;
  }
  .icon-btn {
    width: 40px; height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    color: var(--text);
    transition: background .15s;
    position: relative;
  }
  .icon-btn:hover, .icon-btn:active { background: var(--surface-alt); }
  .icon-btn svg { width: 22px; height: 22px; }
  .badge {
    position: absolute;
    top: 4px; right: 4px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: 8px;
    background: var(--primary);
    color: var(--primary-ink);
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- View tabs ---------- */
  .view-tabs {
    display: flex;
    gap: 4px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .view-tabs::-webkit-scrollbar { display: none; }
  .view-tabs button {
    padding: 9px 16px;
    min-height: 38px;
    border-radius: 999px;
    background: var(--surface-alt);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.88rem;
    white-space: nowrap;
    transition: background .15s, color .15s;
  }
  .view-tabs button.active {
    background: var(--primary);
    color: var(--primary-ink);
  }

  /* ---------- Search bar ---------- */
  .search-bar {
    padding: 8px 12px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .search-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-alt);
    border-radius: 999px;
    padding: 0 12px;
    border: 1px solid var(--border);
    transition: border-color .15s, background .15s;
  }
  .search-input-wrap:focus-within {
    border-color: var(--primary);
    background: var(--surface);
  }
  .search-input-wrap svg {
    width: 16px; height: 16px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .search-input-wrap input {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    padding: 10px 4px;
    font-size: 0.95rem;
    outline: none;
    color: var(--text);
  }
  .search-input-wrap input::-webkit-search-cancel-button { display: none; }
  .search-clear {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--border);
    color: var(--text-muted);
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .12s, color .12s;
  }
  .search-clear svg { width: 12px; height: 12px; }
  .search-clear:hover { background: var(--text-muted); color: var(--surface); }
  .search-clear.show { display: inline-flex; }
  .search-summary {
    font-size: 0.85rem;
    color: var(--text-muted);
    padding: 2px 4px 12px;
  }

  /* ---------- Week view ---------- */
  .week-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .week-day h3 {
    font-size: 0.9rem;
    font-weight: 700;
    margin: 0 2px 6px;
    color: var(--text);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .week-day h3 .today-pill {
    font-size: 0.65rem;
    font-weight: 800;
    background: var(--primary);
    color: var(--primary-ink);
    padding: 2px 8px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .week-day.today h3 { color: var(--primary); }
  .week-empty {
    font-size: 0.82rem;
    color: var(--text-muted);
    padding: 6px 4px 10px;
    font-style: italic;
  }
  @media (min-width: 960px) {
    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    .week-day {
      background: var(--surface);
      padding: 10px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      min-height: 260px;
    }
    .week-day .event-card { padding: 10px 10px 10px 14px; }
  }

  /* Swipe hint animation on view change */
  .view-change-in { animation: viewIn .18s ease-out; }
  @keyframes viewIn {
    from { opacity: 0; transform: translateX(var(--swipe-from, 0)); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ---------- Main ---------- */
  main {
    flex: 1;
    padding: 14px 12px;
    padding-bottom: calc(40px + var(--safe-bottom));
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
  }

  /* ---------- Agenda / list view ---------- */
  .agenda { display: flex; flex-direction: column; gap: 18px; }
  .agenda-group h2 {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 0 4px 8px;
  }
  .event-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 14px 14px 18px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    position: relative;
    display: flex;
    gap: 12px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .event-card:active { transform: scale(0.985); }
  .event-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--event-color, var(--primary));
  }
  .event-date {
    flex-shrink: 0;
    width: 50px;
    text-align: center;
    padding-top: 2px;
  }
  .event-date .mon {
    font-size: 0.68rem;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--event-color, var(--primary));
  }
  .event-date .day {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
    margin-top: 2px;
  }
  .event-date .recurring-icon {
    font-size: 1.3rem;
    color: var(--event-color, var(--primary));
  }
  .event-body { flex: 1; min-width: 0; padding-right: 34px; }
  .event-title {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 4px;
    color: var(--text);
  }
  .event-meta {
    font-size: 0.82rem;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    align-items: center;
  }
  .event-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .event-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--surface-alt);
    color: var(--text-muted);
  }
  .tag.cat {
    background: var(--event-color, var(--primary));
    color: #fff;
    opacity: 0.92;
  }
  .tag.tentative { background: rgba(245,158,11,.15); color: var(--warning); }
  .tag.private { background: rgba(100,116,139,.2); color: var(--text-muted); }

  /* ---------- Star / favorite button ---------- */
  .fav-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 34px; height: 34px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: var(--text-muted);
    transition: color .15s, background .15s, transform .12s;
  }
  .fav-btn:hover, .fav-btn:active { background: var(--surface-alt); transform: scale(1.08); }
  .fav-btn svg { width: 18px; height: 18px; }
  .fav-btn.active { color: #f59e0b; }

  /* ---------- Live / starting-soon badge ---------- */
  .live-badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    vertical-align: middle;
  }
  .live-badge.now {
    background: var(--danger); color: #fff;
    animation: pulseNow 1.8s ease-in-out infinite;
  }
  .live-badge.soon { background: rgba(245,158,11,.18); color: var(--warning); }
  @keyframes pulseNow {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }
  .private-note {
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.9em;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.4; margin-bottom: 12px; }

  /* ---------- Month calendar view ---------- */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 4px 10px;
    gap: 6px;
  }
  .cal-nav h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin: 0;
    text-align: center;
    flex: 1;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    background: var(--surface);
    padding: 6px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .cal-dow {
    font-size: 0.65rem;
    font-weight: 700;
    text-align: center;
    padding: 4px 0 6px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cal-cell {
    min-height: 70px;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    padding: 3px 3px 4px;
    font-size: 0.7rem;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
    overflow: hidden;
    border: 1px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .cal-cell.has-events { cursor: pointer; }
  .cal-cell.other-month { opacity: 0.4; }
  .cal-cell .cal-num {
    font-weight: 700;
    font-size: 0.78rem;
    line-height: 1;
    padding: 2px 2px 0;
    color: var(--text);
  }
  .cal-cell.today .cal-num {
    background: var(--primary);
    color: #fff;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    margin: -1px 0 1px;
    font-size: 0.72rem;
  }
  .cal-cell.has-events:hover,
  .cal-cell.has-events:active { background: var(--border); }
  .cal-cell:focus-visible { outline: 2px solid var(--primary); outline-offset: -1px; }
  .cal-events {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 1px;
    overflow: hidden;
  }
  .cal-event-pill {
    background: var(--event-color, var(--primary));
    color: #fff;
    font-size: 0.62rem;
    padding: 1px 4px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
    line-height: 1.3;
    pointer-events: none;
  }
  .cal-event-pill.tentative {
    background: transparent;
    color: var(--event-color, var(--primary));
    border: 1px dashed var(--event-color, var(--primary));
  }
  .cal-event-more {
    font-size: 0.6rem;
    color: var(--text-muted);
    font-weight: 700;
    padding-left: 3px;
    line-height: 1.1;
    pointer-events: none;
  }
  /* Tiny screens: pills collapse to color bars (saves space) */
  @media (max-width: 430px) {
    .cal-cell { min-height: 58px; padding: 2px 2px 3px; }
    .cal-event-pill {
      height: 4px;
      padding: 0;
      font-size: 0;
      border-radius: 2px;
      border: none;
    }
    .cal-event-pill.tentative { background: var(--event-color, var(--primary)); opacity: 0.5; }
  }

  /* ---------- Day list (inside sheet) ---------- */
  .day-event-list { display: flex; flex-direction: column; }
  .day-event-row {
    display: flex;
    align-items: stretch;
    gap: 12px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
    width: 100%;
    text-align: left;
    cursor: pointer;
    background: none;
    transition: background .12s;
    border-left: none;
    border-right: none;
    border-top: none;
  }
  .day-event-row:last-child { border-bottom: none; }
  .day-event-row:hover { background: var(--surface-alt); }
  .day-event-row .dot-bar {
    width: 4px;
    border-radius: 2px;
    flex-shrink: 0;
    background: var(--event-color, var(--primary));
  }
  .day-event-row .day-event-body { flex: 1; min-width: 0; }
  .day-event-row .day-event-title {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 3px;
    color: var(--text);
    word-break: break-word;
  }
  .day-event-row .day-event-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
  }
  .day-event-row .day-event-chev {
    width: 18px; height: 18px;
    color: var(--text-muted);
    flex-shrink: 0;
    align-self: center;
  }
  .day-empty {
    padding: 32px 20px;
    text-align: center;
    color: var(--text-muted);
  }

  /* ---------- Filter drawer ---------- */
  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-height: 85vh;
    background: var(--surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    z-index: 60;
    transform: translateY(100%);
    transition: transform .25s ease-out, visibility 0s linear .25s;
    padding: 16px 16px calc(16px + var(--safe-bottom));
    box-shadow: var(--shadow-lg);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
    visibility: hidden;
  }
  .drawer.open { transform: translateY(0); visibility: visible; transition: transform .25s ease-out; }
  .drawer .handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 8px;
  }
  .drawer h3 {
    font-size: 1.15rem;
    margin: 0 0 4px;
  }

  .filter-group h4 {
    font-size: 0.78rem;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 8px;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 7px 12px;
    border-radius: 999px;
    background: var(--surface-alt);
    color: var(--text);
    font-size: 0.85rem;
    font-weight: 500;
    border: 1.5px solid transparent;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip.active {
    background: var(--primary);
    color: var(--primary-ink);
    border-color: var(--primary);
  }
  .chip .swatch {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--swatch, var(--primary));
  }
  .chip.active .swatch { background: #fff; }

  .drawer-actions {
    display: flex;
    gap: 10px;
    padding-top: 8px;
    position: sticky;
    bottom: 0;
    background: var(--surface);
    padding-bottom: 4px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.95rem;
    transition: filter .15s;
  }
  .btn-primary { background: var(--primary); color: var(--primary-ink); }
  .btn-ghost { background: var(--surface-alt); color: var(--text); }
  .btn:hover { filter: brightness(1.05); }

  /* ---------- Event detail sheet ---------- */
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-height: 92vh;
    background: var(--surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    z-index: 60;
    transform: translateY(100%);
    transition: transform .25s ease-out, visibility 0s linear .25s;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    visibility: hidden;
  }
  .sheet.open { transform: translateY(0); visibility: visible; transition: transform .25s ease-out; }
  .sheet-header {
    padding: 18px 18px 14px;
    background: var(--event-color, var(--primary));
    color: #fff;
    position: relative;
  }
  .sheet-header .handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,.5);
    border-radius: 2px;
    margin: 0 auto 10px;
  }
  .sheet-header h3 {
    font-size: 1.2rem;
    margin: 0 130px 6px 0;
    font-weight: 700;
    min-height: 1.4em;
  }
  .sheet-header .sub {
    font-size: 0.85rem;
    opacity: 0.9;
    margin-right: 130px;
  }
  .sheet-actions {
    position: absolute;
    top: 14px; right: 12px;
    display: flex;
    gap: 6px;
  }
  .sheet-actions button {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
  }
  .sheet-actions button:hover,
  .sheet-actions button:active { background: rgba(255,255,255,.35); }
  .sheet-actions svg { width: 18px; height: 18px; }
  .sheet-footer {
    padding: 12px 16px calc(14px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 8px;
  }
  .sheet-footer .btn {
    padding: 11px;
    font-size: 0.9rem;
  }
  /* Toast */
  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(28px + var(--safe-bottom));
    transform: translateX(-50%) translateY(20px);
    background: #0f172a;
    color: #fff;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    max-width: 90vw;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .sheet-body {
    padding: 16px 18px calc(18px + var(--safe-bottom));
    overflow-y: auto;
    flex: 1;
  }
  .detail-row {
    display: flex;

<script>
  /* ---------- Data loading ---------- */
  const CSV_URL_B64 = 'aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvZS8yUEFDWC0xdlRiRVF2TWJsYlFjdWcyaGVIMF9sMjRnYXlhSWRWV0hZVVNkLS1NUGFOOEd4dXpPYmNTV3gyNXFHNkEzUlNGS0VzVUFnMGY0S2JER1BUUi9wdWI/Z2lkPTczMzQzNDc5NCZzaW5nbGU9dHJ1ZSZvdXRwdXQ9Y3N2';
  const CSV_URL = atob(CSV_URL_B64);

  /* Category palette — single source of truth.
     Override or extend here to retheme the whole calendar. */
  const CATEGORIES = [
    { name: 'Assembly',         color: '#6A1B9A', description: 'Area assemblies (Spring/Summer/Fall)' },
    { name: 'Workshop',         color: '#1976D2', description: 'GV / Grapevine workshops' },
    { name: 'Conference',       color: '#C62828', description: 'Multi-day conferences' },
    { name: 'Convention',       color: '#B71C1C', description: 'State / regional conventions' },
    { name: 'Anniversary',      color: '#F9A825', description: 'Group / area anniversaries' },
    { name: 'Social',           color: '#F57C00', description: 'Parties and social events' },
    { name: 'TownHall',         color: '#00897B', description: 'Town hall / open forum meetings' },
    { name: 'Committee',        color: '#2E7D32', description: 'Committee and chair meetings' },
    { name: 'District',         color: '#1B5E20', description: 'District business meetings' },
    { name: 'Group Conscience', color: '#827717', description: 'Group conscience meetings' },
    { name: 'Community',        color: '#5E35B1', description: 'Community / citywide gatherings' },
    { name: 'Birthday',         color: '#D81B60', description: 'Group birthday celebrations' },
    { name: 'Training',         color: '#0277BD', description: 'Bootcamps and trainings' },
    { name: 'Roundup',          color: '#4527A0', description: 'Roundups' },
    { name: 'Speaker',          color: '#00838F', description: 'Speaker meetings (story, steps, traditions, concepts, mix)' },
  ];
  const CATEGORY_COLOR = Object.fromEntries(CATEGORIES.map(c => [c.name, c.color]));
  const DEFAULT_COLOR = '#2E7D32';
  const colorFor = (cat) => CATEGORY_COLOR[cat] || DEFAULT_COLOR;

  const STATE = {
    events: [],
    view: 'calendar',
    calCursor: new Date(),
    filters: { categories: [], formats: [], languages: [], statuses: [] },
    currentEvent: null,
    search: '',
    range: '',
    loading: true,
    loadError: null,
    favorites: new Set(),
  };

  /* ---------- Favorites (localStorage) ---------- */
  const FAVS_KEY = 'aa-events-favs:v1';
  function loadFavorites() {
    try {
      const raw = localStorage.getItem(FAVS_KEY);
      if (raw) STATE.favorites = new Set(JSON.parse(raw));
    } catch (_) { /* storage may be disabled; run without persistence */ }
  }
  function saveFavorites() {
    try { localStorage.setItem(FAVS_KEY, JSON.stringify([...STATE.favorites])); }
    catch (_) {}
  }
  function isFavorite(e) { return STATE.favorites.has(String(e.id)); }
  function toggleFavorite(id) {
    const key = String(id);
    if (STATE.favorites.has(key)) STATE.favorites.delete(key);
    else STATE.favorites.add(key);
    saveFavorites();
  }

  /* ---------- URL state (deep links) ----------
     Shape: ?view=week&date=2026-04-19&q=foo&range=7&event=8
     `date` = calendar cursor (month for Month view, week-start for Week view). */
  const VIEWS = ['calendar','week','upcoming','recurring','all','starred'];
  const RANGES = ['today','weekend','7','30'];
  function applyURLToState() {
    const p = new URLSearchParams(location.search);
    const v = p.get('view'); if (v && VIEWS.includes(v)) STATE.view = v;
    const d = p.get('date');
    if (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
      const [y,mo,da] = d.split('-').map(Number);
      STATE.calCursor = new Date(y, mo-1, da);
    }
    const q = p.get('q'); if (q) STATE.search = q;
    const r = p.get('range'); if (r && RANGES.includes(r)) STATE.range = r;
    return { eventId: p.get('event'), dayISO: p.get('day') };
  }
  function updateURL() {
    const p = new URLSearchParams();
    if (STATE.view !== 'calendar') p.set('view', STATE.view);
    if (STATE.view === 'calendar' || STATE.view === 'week') {
      p.set('date', fmtISO(STATE.calCursor));
    }
    if (STATE.search) p.set('q', STATE.search);
    if (STATE.range)  p.set('range', STATE.range);
    if (STATE.currentEvent) p.set('event', String(STATE.currentEvent.id));
    const qs = p.toString();
    history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
  }

  function parseCSV(text) {
    const rows = [];
    let field = '';
    let row = [];
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i+1] === '"') { field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n' || c === '\r') {
          if (field !== '' || row.length) { row.push(field); rows.push(row); row = []; field = ''; }
          if (c === '\r' && text[i+1] === '\n') i++;
        } else field += c;
      }
    }
    if (field !== '' || row.length) { row.push(field); rows.push(row); }
    if (!rows.length) return [];
    const headers = rows.shift();
    return rows.filter(r => r.some(v => v !== '')).map(r => {
      const o = {};
      headers.forEach((h, i) => o[h.trim()] = (r[i] ?? '').trim());
      return o;
    });
  }

  async function loadData() {
    try {
      const res = await fetch(CSV_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const raw = parseCSV(text);
      // Apply occurrence overrides on raw rows (pre-coercion) so blank boolean
      // fields inherit from the template instead of masquerading as "false".
      const { mergedRows, overriddenKeys } = mergeOverrides(raw);
      const parsed = mergedRows.map(e => {
        const recurring = String(e.recurring || '').toLowerCase() === 'true' ? 'true' : 'false';
        const all_day  = String(e.all_day  || '').toLowerCase() === 'true' ? 'true' : 'false';
        const priv     = String(e.private  || '').toLowerCase() === 'true' ? 'true' : 'false';
        return { ...e, recurring, all_day, private: priv, _start: toDate(e.start_date, e.start_time) };
      });
      // Drop expanded instances that have been replaced by an explicit override.
      const occurrences = expandRecurring(parsed).filter(i =>
        !overriddenKeys.has(`${i._recurring_origin}:${i.start_date}`)
      );
      STATE.events = [...parsed, ...occurrences];
    } catch (err) {
      STATE.loadError = err.message;
    } finally {
      STATE.loading = false;
    }
  }

  /* ---------- Occurrence overrides ----------
     A row with `override_of=<series id>` and a concrete `start_date` replaces the
     matching expanded instance of that series. Blank fields inherit from the
     template; non-blank fields override. Must run on RAW CSV rows so that
     boolean coercion of blank fields doesn't act like an explicit override. */
  function mergeOverrides(rawRows) {
    const templatesById = new Map();
    rawRows.forEach(r => {
      if (String(r.recurring || '').toLowerCase() === 'true') templatesById.set(String(r.id), r);
    });
    const overriddenKeys = new Set();
    const mergedRows = [];
    rawRows.forEach(r => {
      if (!r.override_of || !r.start_date) { mergedRows.push(r); return; }
      const tpl = templatesById.get(String(r.override_of));
      if (!tpl) {
        console.warn(`override_of=${r.override_of} references an unknown series; row ${r.id} skipped`);
        return; // drop the orphan — without a template it has no meaningful content
      }
      const merged = {};
      const keys = new Set([...Object.keys(tpl), ...Object.keys(r)]);
      keys.forEach(k => {
        const v = r[k];
        merged[k] = (v !== undefined && v !== '') ? v : (tpl[k] ?? '');
      });
      // These are always set by the override, not inherited from the template.
      merged.id = r.id;
      merged.recurring = 'false';
      merged.recurrence_pattern = '';
      merged.override_of = '';
      merged.start_date = r.start_date;
      merged.end_date = r.end_date || r.start_date;
      merged._recurring_origin = tpl.id; // keeps the ↻ "part of series" marker
      mergedRows.push(merged);
      overriddenKeys.add(`${tpl.id}:${r.start_date}`);
    });
    return { mergedRows, overriddenKeys };
  }

  /* ---------- Helpers ---------- */
  function toDate(d, t) {
    if (!d) return null;
    const [y, m, day] = d.split('-').map(Number);
    const [hh = 0, mm = 0] = (t || '00:00').split(':').map(Number);
    return new Date(y, m-1, day, hh, mm);
  }
  function fmtISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  /* ---------- Recurring event expansion ----------
     Generates concrete instances of recurring events for the next 12 months
     so they appear on the calendar and in Upcoming alongside dated events.
     The original "template" row stays in STATE so the Recurring tab keeps
     showing the pattern (e.g. "Second Sunday of every month"). */
  const ORDINALS = { first: 0, second: 1, third: 2, fourth: 3, fifth: 4, last: -1 };
  const DAYS_OF_WEEK = { sunday: 0, monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5, saturday: 6 };
  function nthWeekdayOfMonth(year, month, dow, nth) {
    if (nth === -1) {
      const lastDay = new Date(year, month + 1, 0);
      const diff = (lastDay.getDay() - dow + 7) % 7;
      return new Date(year, month, lastDay.getDate() - diff);
    }
    const first = new Date(year, month, 1);
    const diff = (dow - first.getDay() + 7) % 7;
    const day = 1 + diff + nth * 7;
    const maxDay = new Date(year, month + 1, 0).getDate();
    return day > maxDay ? null : new Date(year, month, day);
  }
  function parseRecurrencePattern(pattern) {
    const p = (pattern || '').toLowerCase();
    // Monthly: "<nth> <dow> [of every month]"   e.g. "Second Sunday of every month", "Last Saturday"
    const monthly = p.match(/(first|second|third|fourth|fifth|last)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)/);
    if (monthly) return { kind: 'monthly', nth: ORDINALS[monthly[1]], dow: DAYS_OF_WEEK[monthly[2]] };
    // Weekly:  "every <dow>" or "weekly on <dow>"   e.g. "Every Tuesday", "Weekly on Monday"
    const weekly = p.match(/\b(?:every|weekly on)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\b/);
    if (weekly) return { kind: 'weekly', dow: DAYS_OF_WEEK[weekly[1]] };
    return null;
  }
  function expandRecurring(events) {
    const today = startOfDay(new Date());
    const defaultHorizon = new Date(today); defaultHorizon.setFullYear(defaultHorizon.getFullYear() + 1);
    const instances = [];
    events.filter(e => e.recurring === 'true').forEach(e => {
      const rule = parseRecurrencePattern(e.recurrence_pattern);
      if (!rule) return;
      const [sh = 0, sm = 0] = (e.start_time || '00:00').split(':').map(Number);

      // Bounds: explicit start_date/end_date on the template define the series window.
      // Without them, fall back to the rolling today → +12-month horizon.
      const boundStart = e.start_date ? toDate(e.start_date, '00:00') : today;
      const boundEnd   = e.end_date   ? toDate(e.end_date,   '23:59') : defaultHorizon;
      if (!boundStart || !boundEnd || boundEnd < boundStart) return;

      const push = (d) => {
        const start = new Date(d); start.setHours(sh, sm, 0, 0);
        if (start < boundStart || start > boundEnd) return;
        const iso = fmtISO(start);
        instances.push({
          ...e,
          id: `${e.id}-${iso}`,
          recurring: 'false',
          _recurring_origin: e.id,
          _auto_generated: true, // distinguishes expansions from manual overrides
          start_date: iso,
          end_date: iso,
          end_time: (e.end_time || ''),
          _start: start,
        });
      };

      if (rule.kind === 'monthly') {
        const cursor = new Date(boundStart.getFullYear(), boundStart.getMonth(), 1);
        while (cursor <= boundEnd) {
          const d = nthWeekdayOfMonth(cursor.getFullYear(), cursor.getMonth(), rule.dow, rule.nth);
          if (d) push(d);
          cursor.setMonth(cursor.getMonth() + 1);
        }
      } else if (rule.kind === 'weekly') {
        const cursor = new Date(boundStart);
        cursor.setDate(cursor.getDate() + ((rule.dow - cursor.getDay() + 7) % 7));
        while (cursor <= boundEnd) {
          push(cursor);
          cursor.setDate(cursor.getDate() + 7);
        }
      }
    });
    return instances;
  }

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  function fmtTime(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const p = h >= 12 ? 'pm' : 'am';
    const h12 = ((h + 11) % 12) + 1;
    return m ? `${h12}:${String(m).padStart(2,'0')} ${p}` : `${h12}${p}`;
  }
  function fmtDateRange(e) {
    if (e.recurring === 'true') {
      const pattern = e.recurrence_pattern || 'Recurring';
      // Bounded series (start_date + end_date) — append the window so users see when it runs.
      if (e.start_date && e.end_date) {
        const bs = toDate(e.start_date, '00:00');
        const be = toDate(e.end_date, '00:00');
        if (bs && be) {
          const sameYear = bs.getFullYear() === be.getFullYear();
          const bsStr = `${MONTHS[bs.getMonth()]} ${bs.getDate()}`;
          const beStr = `${MONTHS[be.getMonth()]} ${be.getDate()}, ${be.getFullYear()}`;
          return `${pattern} · ${sameYear ? bsStr : `${bsStr}, ${bs.getFullYear()}`} – ${beStr}`;
        }
      }
      return pattern;
    }
    const s = toDate(e.start_date, e.start_time);
    const en = toDate(e.end_date, e.end_time);
    if (!s) return '';
    const sStr = `${MONTHS[s.getMonth()]} ${s.getDate()}`;
    const sameDay = en ? (en.toDateString() === s.toDateString()) : true;
    if (!sameDay) {
      const enStr = `${MONTHS[en.getMonth()]} ${en.getDate()}`;
      const sTime = e.start_time ? `, ${fmtTime(e.start_time)}` : '';
      const enTime = e.end_time  ? `, ${fmtTime(e.end_time)}`  : '';
      return `${sStr}${sTime} – ${enStr}${enTime}`;
    }
    const times = [e.start_time && fmtTime(e.start_time), e.end_time && fmtTime(e.end_time)].filter(Boolean).join(' – ');
    return times ? `${sStr} · ${times}` : sStr;
  }
  function uniq(arr) { return [...new Set(arr.filter(Boolean))]; }
  const isPrivate = (e) => e && e.private === 'true';
  // Pull "Homegroup: X" out of notes so speaker meetings can show it as a dedicated field.
  // Returns { homegroup, rest } where rest is the notes minus the homegroup line.
  function splitHomegroup(notes) {
    if (!notes) return { homegroup: '', rest: '' };
    const lines = notes.split(/\r?\n|\s*\|\s*/); // support "a | b" single-line or multi-line
    let homegroup = '';
    const other = [];
    for (const ln of lines) {
      const m = ln.match(/^\s*homegroup\s*[:\-]\s*(.+?)\s*$/i);
      if (m && !homegroup) homegroup = m[1];
      else if (ln.trim()) other.push(ln.trim());
    }
    return { homegroup, rest: other.join(' · ') };
  }
  const PRIVATE_NOTE = 'Private event — contact host for details';
  // Inline copy-to-clipboard button used in the event detail sheet.
  function copyBtn(value, label) {
    return `<button type="button" class="copy-btn" data-copy="${escapeHtml(value)}" aria-label="Copy ${escapeHtml(label)}" title="Copy ${escapeHtml(label)}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </button>`;
  }
  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
      showToast('Copied');
    } catch (_) {
      // Fallback for non-secure contexts
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast('Copied'); } catch (__) { showToast('Copy failed'); }
      ta.remove();
    }
  }
  const FORMAT_ICONS = {
    'In-Person': '📍',
    'Virtual':   '💻',
    'Hybrid':    '🔀',
  };
  const LANG_LABEL = {
    'English': 'EN',
    'Spanish': 'ES',
    'Both':    'EN/ES',
  };

  /* ---------- Filtering ---------- */
  function eventPassesFilters(e) {
    const f = STATE.filters;
    if (f.categories.length && !f.categories.includes(e.category)) return false;
    if (f.formats.length    && !f.formats.includes(e.format))     return false;
    if (f.languages.length  && !f.languages.includes(e.language)) return false;
    if (f.statuses.length   && !f.statuses.includes(e.status))    return false;
    return true;
  }
  function activeFilterCount() {
    return Object.values(STATE.filters).reduce((n, a) => n + a.length, 0);
  }
  function matchesSearch(e) {
    const q = STATE.search.trim().toLowerCase();
    if (!q) return true;
    // Don't leak private-event address/zoom details into search matches
    const priv = isPrivate(e);
    const fields = [
      e.title, e.category, e.recurrence_pattern, e.format, e.language,
      e.status, e.cost, e.notes,
      priv ? '' : e.venue_name,
      priv ? '' : e.address,
      priv ? '' : e.city,
      priv ? '' : e.state,
      priv ? '' : e.zip,
      priv ? '' : e.virtual_platform,
    ];
    return fields.join(' ').toLowerCase().includes(q);
  }

  /* ---------- Range filter (quick date chips) ---------- */
  function rangeBounds(range) {
    if (!range) return null;
    const t = startOfDay(new Date());
    const end = new Date(t);
    if (range === 'today')   { end.setDate(t.getDate() + 1); return [t, end]; }
    if (range === '7')       { end.setDate(t.getDate() + 7); return [t, end]; }
    if (range === '30')      { end.setDate(t.getDate() + 30); return [t, end]; }
    if (range === 'weekend') {
      const dow = t.getDay(); // 0=Sun
      const start = new Date(t);
      if (dow === 0)      { /* Sunday: today only weekend day left */ end.setDate(t.getDate() + 1); }
      else if (dow === 6) { /* Saturday: today + Sun */ end.setDate(t.getDate() + 2); }
      else { /* Weekday: jump to upcoming Sat through Sun */ start.setDate(t.getDate() + (6 - dow)); end.setTime(start.getTime()); end.setDate(start.getDate() + 2); }
      return [start, end];
    }
    return null;
  }
  function matchesRange(e) {
    const b = rangeBounds(STATE.range);
    if (!b) return true;
    // Exclude recurring templates (no date); instances are concrete and handled below
    if (e.recurring === 'true') return false;
    if (!e._start) return false;
    const [start, end] = b;
    // An event matches if it overlaps the window [start, end)
    const s = e._start;
    const en = toDate(e.end_date, e.end_time) || s;
    return s < end && en >= start;
  }

  /* ---------- Rendering ---------- */
  function render() {
    const main = document.getElementById('main');
    updateURL();
    if (STATE.loading) {
      main.innerHTML = `<div class="empty-state" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <p>Loading events…</p></div>`;
      return;
    }
    if (STATE.loadError) {
      main.innerHTML = `<div class="empty-state" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>
        <p><strong>Unable to load events</strong></p>
        <p>${escapeHtml(STATE.loadError)}</p>
        <p style="margin-top:10px; font-size:.85rem">If opening from disk, run a local server:<br/>
        <code>python -m http.server</code></p>
      </div>`;
      return;
    }
    const filtered = STATE.events
      .filter(eventPassesFilters)
      .filter(matchesSearch)
      .filter(matchesRange);
    if (STATE.search.trim()) return renderSearchResults(main, filtered);
    if (STATE.view === 'calendar') return renderCalendar(main, filtered);
    if (STATE.view === 'week')     return renderWeek(main, filtered);
    if (STATE.view === 'recurring') return renderList(main, filtered.filter(e => e.recurring === 'true'), 'recurring');
    if (STATE.view === 'all')       return renderList(main, filtered, 'all');
    if (STATE.view === 'starred')   return renderStarred(main, filtered);
    return renderList(main, filtered.filter(e => e.recurring !== 'true' && e._start && e._start >= startOfDay(new Date())), 'upcoming');
  }

  function renderStarred(main, events) {
    const starred = events.filter(e => isFavorite(e) && !e._auto_generated);
    if (!starred.length) {
      main.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <p><strong>No starred events yet</strong></p>
        <p style="font-size:.85rem">Tap the ★ on any event to save it here.</p></div>`;
      return;
    }
    // Sort: upcoming dated first (soonest), then recurring templates, then past.
    const today = startOfDay(new Date());
    const upcoming = starred.filter(e => e.recurring !== 'true' && e._start && e._start >= today).sort((a,b) => a._start - b._start);
    const recurring = starred.filter(e => e.recurring === 'true');
    const past = starred.filter(e => e.recurring !== 'true' && e._start && e._start < today).sort((a,b) => b._start - a._start);
    const section = (label, items) => items.length
      ? `<div class="agenda-group"><h2>${label} (${items.length})</h2>${items.map(eventCard).join('')}</div>` : '';
    main.innerHTML = `<div class="agenda">
      ${section('Upcoming', upcoming)}
      ${section('Recurring', recurring)}
      ${section('Past', past)}
    </div>`;
  }

  function startOfWeek(d) {
    const x = startOfDay(d);
    x.setDate(x.getDate() - x.getDay()); // Sunday-start
    return x;
  }

  function renderWeek(main, events) {
    const weekStart = startOfWeek(STATE.calCursor);
    const days = Array.from({length: 7}, (_, i) => {
      const d = new Date(weekStart); d.setDate(d.getDate() + i); return d;
    });

    // Bucket concrete (dated) events by day in the visible week
    const byDate = {};
    events.forEach(e => {
      if (e.recurring === 'true') return;
      if (!e._start) return;
      const s = e._start;
      const en = toDate(e.end_date, e.end_time) || s;
      const d = new Date(s); d.setHours(0,0,0,0);
      const endD = new Date(en); endD.setHours(0,0,0,0);
      while (d <= endD) {
        (byDate[fmtISO(d)] ??= []).push(e);
        d.setDate(d.getDate() + 1);
      }
    });

    const today = startOfDay(new Date()).getTime();
    const sections = days.map(d => {
      const key = fmtISO(d);
      const todays = (byDate[key] || []).slice().sort((a,b) => (a._start || 0) - (b._start || 0));
      const isToday = startOfDay(d).getTime() === today;
      const dayLabel = `${DOW_LONG[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
      const body = todays.length
        ? todays.map(eventCard).join('')
        : '<div class="week-empty">No events</div>';
      return `<div class="week-day ${isToday ? 'today' : ''}">
        <h3>${dayLabel}${isToday ? '<span class="today-pill">Today</span>' : ''}</h3>
        ${body}
      </div>`;
    }).join('');

    const weekEnd = days[6];
    const sameMonth = weekStart.getMonth() === weekEnd.getMonth();
    const sameYear  = weekStart.getFullYear() === weekEnd.getFullYear();
    const title = sameMonth
      ? `${MONTHS[weekStart.getMonth()]} ${weekStart.getDate()} – ${weekEnd.getDate()}, ${weekEnd.getFullYear()}`
      : sameYear
        ? `${MONTHS[weekStart.getMonth()]} ${weekStart.getDate()} – ${MONTHS[weekEnd.getMonth()]} ${weekEnd.getDate()}, ${weekEnd.getFullYear()}`
        : `${MONTHS[weekStart.getMonth()]} ${weekStart.getDate()}, ${weekStart.getFullYear()} – ${MONTHS[weekEnd.getMonth()]} ${weekEnd.getDate()}, ${weekEnd.getFullYear()}`;

    main.innerHTML = `
      <div class="cal-nav">
        <button type="button" class="icon-btn" id="week-prev" aria-label="Previous week"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <h2>${title}</h2>
        <button type="button" class="icon-btn" id="week-next" aria-label="Next week"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="week-grid">${sections}</div>
    `;

    document.getElementById('week-prev').onclick = () => stepWeek(-1);
    document.getElementById('week-next').onclick = () => stepWeek(1);
  }

  function stepMonth(delta) {
    STATE.calCursor = new Date(STATE.calCursor.getFullYear(), STATE.calCursor.getMonth() + delta, 1);
    render();
  }
  function stepWeek(delta) {
    const d = new Date(STATE.calCursor); d.setDate(d.getDate() + delta * 7);
    STATE.calCursor = d;
    render();
  }

  function renderSearchResults(main, events) {
    const q = STATE.search.trim();
    // Hide auto-generated instances — the template already covers them. Manual
    // overrides (which also have _recurring_origin set) stay visible.
    const cleaned = events.filter(e => !e._auto_generated);
    if (!cleaned.length) {
      main.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>No events match <strong>"${escapeHtml(q)}"</strong></p>
      </div>`;
      return;
    }
    const today = startOfDay(new Date());
    const recurring = cleaned.filter(e => e.recurring === 'true');
    const upcoming = cleaned.filter(e => e.recurring !== 'true' && e._start && e._start >= today).sort((a,b) => a._start - b._start);
    const past     = cleaned.filter(e => e.recurring !== 'true' && e._start && e._start <  today).sort((a,b) => b._start - a._start);

    const section = (label, items) => items.length
      ? `<div class="agenda-group"><h2>${label} (${items.length})</h2>${items.map(eventCard).join('')}</div>` : '';

    main.innerHTML = `
      <div class="search-summary">Results for <strong>"${escapeHtml(q)}"</strong> · ${cleaned.length} match${cleaned.length === 1 ? '' : 'es'}</div>
      <div class="agenda">
        ${section('Upcoming', upcoming)}
        ${section('Recurring', recurring)}
        ${section('Past', past)}
      </div>`;
  }

  function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }

  function renderList(main, events, mode) {
    if (!events.length) {
      main.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <p>No events match your filters.</p></div>`;
      return;
    }

    if (mode === 'recurring') {
      main.innerHTML = `<div class="agenda"><div class="agenda-group"><h2>Recurring meetings</h2>${events.map(eventCard).join('')}</div></div>`;
      return;
    }

    // Group dated events by month. Skip recurring templates — their instances are already dated.
    const dated = events.filter(e => e._start && e.recurring !== 'true').sort((a,b) => a._start - b._start);
    const recurring = events.filter(e => e.recurring === 'true');
    const groups = {};
    dated.forEach(e => {
      const key = `${e._start.getFullYear()}-${String(e._start.getMonth()).padStart(2,'0')}`;
      const label = `${MONTHS[e._start.getMonth()]} ${e._start.getFullYear()}`;
      (groups[key] ??= { label, items: [] }).items.push(e);
    });

    const groupHTML = Object.values(groups).map(g =>
      `<div class="agenda-group"><h2>${g.label}</h2>${g.items.map(eventCard).join('')}</div>`
    ).join('');

    const recurHTML = (mode === 'all' && recurring.length)
      ? `<div class="agenda-group"><h2>Recurring</h2>${recurring.map(eventCard).join('')}</div>`
      : '';

    main.innerHTML = `<div class="agenda">${groupHTML}${recurHTML}</div>`;
  }

  function eventCard(e) {
    const color = colorFor(e.category);
    const datePart = e.recurring === 'true'
      ? `<div class="recurring-icon">↻</div><div class="mon" style="margin-top:2px">${(e.recurrence_pattern||'').split(' ')[0] || 'Every'}</div>`
      : (e._start
          ? `<div class="mon">${MONTHS[e._start.getMonth()]}</div><div class="day">${e._start.getDate()}</div>`
          : `<div class="mon">TBD</div>`);
    const when = fmtDateRange(e);
    const priv = isPrivate(e);
    const loc = priv
      ? 'Private — contact host'
      : (e.format === 'Virtual'
          ? 'Online'
          : [e.venue_name, e.city].filter(Boolean).join(', '));
    const tags = [
      `<span class="tag cat">${escapeHtml(e.category || '')}</span>`,
      priv ? `<span class="tag private">🔒 Private</span>` : '',
      e._recurring_origin ? `<span class="tag">↻ Recurring</span>` : '',
      e.format ? `<span class="tag">${FORMAT_ICONS[e.format]||''} ${e.format}</span>` : '',
      e.language ? `<span class="tag">${LANG_LABEL[e.language]||e.language}</span>` : '',
      e.status === 'Tentative' ? `<span class="tag tentative">Tentative</span>` : '',
      e.cost ? `<span class="tag">${escapeHtml(e.cost)}</span>` : '',
    ].filter(Boolean).join('');

    const fav = isFavorite(e);
    const liveBadge = liveStatusBadge(e);
    return `
      <article class="event-card" data-id="${escapeHtml(e.id)}" style="--event-color:${color}">
        <div class="event-date">${datePart}</div>
        <div class="event-body">
          <div class="event-title">${escapeHtml(e.title)}${liveBadge}</div>
          <div class="event-meta">
            <span>🕒 ${escapeHtml(when)}</span>
            ${loc ? `<span>${isPrivate(e) ? '🔒' : '📍'} ${escapeHtml(loc)}</span>` : ''}
          </div>
          <div class="event-tags">${tags}</div>
        </div>
        <button type="button" class="fav-btn ${fav ? 'active' : ''}" data-fav="${escapeHtml(e.id)}"
          aria-label="${fav ? 'Remove from starred' : 'Add to starred'}" aria-pressed="${fav}">
          <svg viewBox="0 0 24 24" fill="${fav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </article>`;
  }

  /* ---------- Live time status ----------
     Returns a small inline HTML badge for events happening now or starting
     within the next hour. Empty string otherwise. */
  function liveStatusBadge(e) {
    if (e.recurring === 'true' || !e._start) return '';
    const now = Date.now();
    const start = e._start.getTime();
    const end = (toDate(e.end_date, e.end_time) || e._start).getTime();
    if (now >= start && now <= end) {
      return ' <span class="live-badge now">● Now</span>';
    }
    const minsUntil = Math.round((start - now) / 60000);
    if (minsUntil > 0 && minsUntil <= 60) {
      return ` <span class="live-badge soon">Starts in ${minsUntil}m</span>`;
    }
    return '';
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderCalendar(main, events) {
    const cursor = STATE.calCursor;
    const y = cursor.getFullYear(), m = cursor.getMonth();
    const first = new Date(y, m, 1);
    const startOffset = first.getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const today = startOfDay(new Date());

    // Bucket events by yyyy-mm-dd (including multi-day spans)
    const byDate = {};
    events.forEach(e => {
      if (e.recurring === 'true') return;
      const s = toDate(e.start_date, e.start_time);
      if (!s) return;
      const en = toDate(e.end_date, e.end_time) || s;
      const d = new Date(s); d.setHours(0,0,0,0);
      const endD = new Date(en); endD.setHours(0,0,0,0);
      while (d <= endD) {
        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        (byDate[key] ??= []).push(e);
        d.setDate(d.getDate() + 1);
      }
    });

    // Desktop shows up to 3 title pills; mobile (via CSS) collapses them to color bars.
    const MAX_PILLS = 3;
    const buildPills = (items) => {
      const pills = items.slice(0, MAX_PILLS).map(e => {
        const color = colorFor(e.category);
        const cls = e.status === 'Tentative' ? 'cal-event-pill tentative' : 'cal-event-pill';
        return `<div class="${cls}" style="--event-color:${color}" title="${escapeHtml(e.title)}">${escapeHtml(e.title)}</div>`;
      }).join('');
      const more = items.length > MAX_PILLS ? `<div class="cal-event-more">+${items.length - MAX_PILLS} more</div>` : '';
      return pills + more;
    };

    let cellsHTML = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
    const prevDays = new Date(y, m, 0).getDate();
    for (let i = startOffset - 1; i >= 0; i--) {
      cellsHTML += `<div class="cal-cell other-month"><div class="cal-num">${prevDays - i}</div></div>`;
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const key = `${y}-${m}-${day}`;
      const todays = (byDate[key] || []).slice().sort((a,b) => (a._start || 0) - (b._start || 0));
      const date = new Date(y, m, day);
      const isToday = date.getTime() === today.getTime();
      const hasEvents = todays.length > 0;
      const interactiveAttrs = hasEvents
        ? `data-date="${key}" role="button" tabindex="0" aria-label="${MONTHS[m]} ${day}, ${todays.length} event${todays.length===1?'':'s'}"`
        : `aria-label="${MONTHS[m]} ${day}"`;
      cellsHTML += `<div class="cal-cell ${hasEvents?'has-events':''} ${isToday?'today':''}"${isToday ? ' aria-current="date"' : ''} ${interactiveAttrs}>
        <div class="cal-num">${day}</div>
        <div class="cal-events">${buildPills(todays)}</div>
      </div>`;
    }
    const totalCells = startOffset + daysInMonth;
    const trail = (7 - (totalCells % 7)) % 7;
    for (let i = 1; i <= trail; i++) {
      cellsHTML += `<div class="cal-cell other-month"><div class="cal-num">${i}</div></div>`;
    }

    // Agenda under the calendar: events in the visible month
    const monthEvents = [];
    for (let day = 1; day <= daysInMonth; day++) {
      const todays = byDate[`${y}-${m}-${day}`] || [];
      todays.forEach(e => { if (!monthEvents.includes(e)) monthEvents.push(e); });
    }
    monthEvents.sort((a,b) => a._start - b._start);

    main.innerHTML = `
      <div class="cal-nav">
        <button type="button" class="icon-btn" id="cal-prev" aria-label="Previous month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <h2>${MONTHS[m]} ${y}</h2>
        <button type="button" class="icon-btn" id="cal-next" aria-label="Next month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="cal-grid">${cellsHTML}</div>
      <div style="margin-top:16px" class="agenda">
        ${monthEvents.length
            ? `<div class="agenda-group"><h2>This month</h2>${monthEvents.map(eventCard).join('')}</div>`
            : `<div class="empty-state">No events this month.</div>`}
      </div>`;

    document.getElementById('cal-prev').onclick = () => { STATE.calCursor = new Date(y, m-1, 1); render(); };
    document.getElementById('cal-next').onclick = () => { STATE.calCursor = new Date(y, m+1, 1); render(); };
  }

  /* ---------- Filter drawer UI ---------- */
  function buildFilters() {
    const inUse = new Set(STATE.events.map(e => e.category).filter(Boolean));
    const cats = [
      ...CATEGORIES.filter(c => inUse.has(c.name)),
      ...[...inUse].filter(n => !CATEGORY_COLOR[n]).map(n => ({ name: n, color: DEFAULT_COLOR })),
    ];

    document.getElementById('filter-categories').innerHTML = cats.map(c =>
      `<button type="button" class="chip" data-group="categories" data-val="${escapeHtml(c.name)}" style="--swatch:${c.color}"><span class="swatch"></span>${escapeHtml(c.name)}</button>`
    ).join('');
    document.getElementById('filter-formats').innerHTML = uniq(STATE.events.map(e => e.format)).map(v =>
      `<button type="button" class="chip" data-group="formats" data-val="${escapeHtml(v)}">${FORMAT_ICONS[v]||''} ${escapeHtml(v)}</button>`
    ).join('');
    document.getElementById('filter-languages').innerHTML = uniq(STATE.events.map(e => e.language)).map(v =>
      `<button type="button" class="chip" data-group="languages" data-val="${escapeHtml(v)}">${escapeHtml(v)}</button>`
    ).join('');
    document.getElementById('filter-statuses').innerHTML = uniq(STATE.events.map(e => e.status)).map(v =>
      `<button type="button" class="chip" data-group="statuses" data-val="${escapeHtml(v)}">${escapeHtml(v)}</button>`
    ).join('');

    document.querySelectorAll('.drawer .chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const g = btn.dataset.group, v = btn.dataset.val;
        const list = STATE.filters[g];
        const i = list.indexOf(v);
        if (i >= 0) list.splice(i, 1); else list.push(v);
        const on = btn.classList.toggle('active');
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        updateFilterBadge();
        render();
      });
    });
  }

  function updateFilterBadge() {
    const n = activeFilterCount();
    const b = document.getElementById('filter-badge');
    b.textContent = n;
    b.hidden = n === 0;
  }

  function syncChipStates() {
    document.querySelectorAll('.drawer .chip').forEach(btn => {
      const g = btn.dataset.group, v = btn.dataset.val;
      const on = STATE.filters[g].includes(v);
      btn.classList.toggle('active', on);
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }
  function syncViewTabs() {
    document.querySelectorAll('.view-tabs button').forEach(btn => {
      const v = btn.dataset.view;
      const r = btn.dataset.range || '';
      const isActive = v === STATE.view && r === (STATE.range || '');
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
      btn.setAttribute('tabindex', isActive ? '0' : '-1');
    });
  }

  /* ---------- Overlays ---------- */
  function openOverlay(id) {
    const el = document.getElementById(id);
    el.classList.add('open');
    el.removeAttribute('inert');
    el.setAttribute('aria-hidden', 'false');
    document.getElementById('scrim').classList.add('open');
  }
  function closeOverlay(id) {
    const el = document.getElementById(id);
    el.classList.remove('open');
    el.setAttribute('inert', '');
    el.setAttribute('aria-hidden', 'true');
  }
  function closeSheet() {
    closeOverlay('sheet');
    closeOverlay('drawer');
    document.getElementById('scrim').classList.remove('open');
    STATE.currentEvent = null;
    updateURL();
  }

  /* ---------- Toast ---------- */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ---------- Share & add-to-calendar ---------- */
  function buildShareText(e) {
    const priv = isPrivate(e);
    const addr = priv
      ? ''
      : [e.venue_name, e.address, [e.city, e.state].filter(Boolean).join(', '), e.zip].filter(Boolean).join(', ');
    const lines = [
      e.title,
      e.category ? `(${e.category})` : '',
      fmtDateRange(e),
      e.format ? `Format: ${e.format}` : '',
      priv ? PRIVATE_NOTE : addr,
      priv ? '' : (e.virtual_link ? `Join: ${e.virtual_link}` : ''),
      priv ? '' : (e.meeting_id   ? `Meeting ID: ${e.meeting_id}` : ''),
      priv ? '' : (e.passcode     ? `Passcode: ${e.passcode}` : ''),
      e.cost ? `Cost: ${e.cost}` : '',
      e.status && e.status !== 'Confirmed' ? `Status: ${e.status}` : '',
      e.source_url ? `Flyer: ${e.source_url}` : '',
      e.notes || '',
    ].filter(Boolean);
    return lines.join('\n');
  }
  async function shareCurrentEvent() {
    const e = STATE.currentEvent;
    if (!e) return;
    const text = buildShareText(e);
    try {
      if (navigator.share) {
        await navigator.share({ title: e.title, text });
      } else {
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard');
      }
    } catch (err) {
      if (err && err.name !== 'AbortError') showToast('Could not share');
    }
  }

  function buildICS(e) {
    const dt = d => d ? `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}00` : '';
    const s = toDate(e.start_date, e.start_time);
    const en = toDate(e.end_date || e.start_date, e.end_time || e.start_time) || s;
    const priv = isPrivate(e);
    const addr = priv
      ? PRIVATE_NOTE
      : [e.venue_name, e.address, [e.city, e.state].filter(Boolean).join(', '), e.zip].filter(Boolean).join(', ');
    const description = buildShareText(e).replace(/\n/g, '\\n');
    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//AA Events//EN',
      'BEGIN:VEVENT',
      `UID:${e.id}@aa-events`,
      `DTSTAMP:${dt(new Date())}Z`,
      `DTSTART:${dt(s)}`,
      `DTEND:${dt(en)}`,
      `SUMMARY:${(e.title || '').replace(/,/g, '\\,')}`,
      `LOCATION:${addr.replace(/,/g, '\\,')}`,
      `DESCRIPTION:${description.replace(/,/g, '\\,')}`,
      e.source_url ? `URL:${e.source_url}` : '',
      'END:VEVENT',
      'END:VCALENDAR',
    ].filter(Boolean).join('\r\n');
    return ics;
  }
  function downloadICS(e) {
    const blob = new Blob([buildICS(e)], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${(e.title || 'event').replace(/[^a-z0-9]+/gi, '-')}.ics`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  /* ---------- Day sheet (list view when tapping a calendar day) ---------- */
  const DOW_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  function eventsOnDay(date) {
    const target = startOfDay(date).getTime();
    return STATE.events
      .filter(eventPassesFilters)
      .filter(matchesSearch)
      .filter(matchesRange)
      .filter(e => {
        if (e.recurring === 'true') return false;
        if (!e._start) return false;
        const s = startOfDay(e._start).getTime();
        const en = startOfDay(toDate(e.end_date, e.end_time) || e._start).getTime();
        return target >= s && target <= en;
      })
      .sort((a,b) => (a._start || 0) - (b._start || 0));
  }
  function openDaySheet(date) {
    const events = eventsOnDay(date);
    if (!events.length) return;
    if (events.length === 1) { openSheet(events[0].id); return; }

    STATE.currentEvent = null;
    document.getElementById('sheet-head').style.setProperty('--event-color', 'var(--primary)');
    document.getElementById('sheet-title').textContent =
      `${DOW_LONG[date.getDay()]}, ${MONTHS[date.getMonth()]} ${date.getDate()}`;
    document.getElementById('sheet-sub').textContent =
      `${events.length} events`;
    document.getElementById('sheet-share').style.display = 'none';
    document.getElementById('sheet-fav').style.display = 'none';

    const rows = events.map(e => {
      const color = colorFor(e.category);
      const priv = isPrivate(e);
      const time = e.start_time ? fmtTime(e.start_time) : 'All day';
      const endBit = (e.end_time && e.end_date === e.start_date) ? ` – ${fmtTime(e.end_time)}` : '';
      const loc = priv
        ? 'Private'
        : (e.format === 'Virtual' ? 'Online' : [e.venue_name, e.city].filter(Boolean).join(', '));
      const recurMark = e._recurring_origin ? ' ↻' : '';
      return `<button type="button" class="day-event-row" data-id="${escapeHtml(e.id)}">
        <span class="dot-bar" style="--event-color:${color}"></span>
        <div class="day-event-body">
          <div class="day-event-title">${escapeHtml(e.title)}${recurMark}</div>
          <div class="day-event-meta">
            <span>🕒 ${escapeHtml(time + endBit)}</span>
            ${loc ? `<span>${priv ? '🔒' : '📍'} ${escapeHtml(loc)}</span>` : ''}
            ${e.status === 'Tentative' ? `<span class="tag tentative">Tentative</span>` : ''}
          </div>
        </div>
        <svg class="day-event-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>`;
    }).join('');

    document.getElementById('sheet-body').innerHTML = `<div class="day-event-list">${rows}</div>`;
    document.getElementById('sheet-footer').innerHTML = '';

    openOverlay('sheet');
    updateURL();
  }

  /* ---------- Detail sheet ---------- */
  function openSheet(id) {
    const e = STATE.events.find(x => x.id === id);
    if (!e) return;
    STATE.currentEvent = e;
    document.getElementById('sheet-share').style.display = '';
    document.getElementById('sheet-fav').style.display = '';
    const color = colorFor(e.category);
    document.getElementById('sheet-head').style.setProperty('--event-color', color);
    document.getElementById('sheet-title').textContent = e.title || '(Untitled)';
    const subBits = [e.category, fmtDateRange(e)].filter(Boolean);
    document.getElementById('sheet-sub').textContent = subBits.join(' · ');

    const priv = isPrivate(e);
    const addressParts = [e.address, [e.city, e.state].filter(Boolean).join(', '), e.zip].filter(Boolean);
    const fullAddress = addressParts.join(' ');
    const venueLabel = [e.venue_name, fullAddress].filter(Boolean).join(' — ');
    const mapsLink = (e.venue_name || fullAddress)
      ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent([e.venue_name, fullAddress].filter(Boolean).join(' '))}" target="_blank" rel="noopener">${escapeHtml(venueLabel)}</a>`
      : '';

    const whereRow = priv
      ? ['Where', `<span class="private-note">🔒 ${PRIVATE_NOTE}</span>`]
      : (mapsLink ? ['Where', mapsLink] : null);
    const joinRow = priv
      ? null
      : (e.virtual_link
          ? ['Join', `<a href="${escapeHtml(e.virtual_link)}" target="_blank" rel="noopener">${escapeHtml(e.virtual_platform || 'Open link')}</a>${copyBtn(e.virtual_link, 'link')}`]
          : (e.virtual_platform ? ['Platform', escapeHtml(e.virtual_platform)] : null));
    const meetingIdRow = priv ? null : (e.meeting_id ? ['Meeting ID', `${escapeHtml(e.meeting_id)}${copyBtn(e.meeting_id, 'meeting ID')}`] : null);
    const passcodeRow  = priv ? null : (e.passcode   ? ['Passcode',   `${escapeHtml(e.passcode)}${copyBtn(e.passcode, 'passcode')}`]   : null);

    const { homegroup, rest: notesRest } = splitHomegroup(e.notes);

    const rows = [
      ['When', e._recurring_origin
          ? `${escapeHtml(fmtDateRange(e))} <span class="tag" style="margin-left:6px">↻ Recurring</span>`
          : (e.recurring === 'true'
              ? escapeHtml(fmtDateRange(e))
              : `${escapeHtml(fmtDateRange(e))}${e.all_day === 'true' ? ' (all day)' : ''}`)],
      ['Format', `${FORMAT_ICONS[e.format]||''} ${escapeHtml(e.format || '—')}${priv ? ' <span class="tag private" style="margin-left:6px">🔒 Private</span>' : ''}`],
      ['Language', escapeHtml(e.language || '—')],
      whereRow,
      homegroup ? ['Homegroup', escapeHtml(homegroup)] : null,
      joinRow,
      meetingIdRow,
      passcodeRow,
      e.cost       ? ['Cost', escapeHtml(e.cost)] : null,
      e.status     ? ['Status', escapeHtml(e.status)] : null,
      e.source_url ? ['Flyer', `<a href="${escapeHtml(e.source_url)}" target="_blank" rel="noopener">Open flyer / link</a>`] : null,
      notesRest    ? ['Notes', escapeHtml(notesRest)] : null,
    ].filter(Boolean);

    document.getElementById('sheet-body').innerHTML = rows.map(([l,v]) =>
      `<div class="detail-row"><div class="lbl">${l}</div><div class="val">${v}</div></div>`
    ).join('');

    const showICS = !!e._start && e.recurring !== 'true';
    document.getElementById('sheet-footer').innerHTML = `
      ${showICS ? '<button type="button" class="btn btn-ghost" id="btn-ics">Add to calendar</button>' : ''}
      <button type="button" class="btn btn-primary" id="btn-share-footer">Share</button>
    `;
    if (showICS) {
      document.getElementById('btn-ics').addEventListener('click', () => downloadICS(e));
    }
    document.getElementById('btn-share-footer').addEventListener('click', shareCurrentEvent);

    syncSheetFav();
    openOverlay('sheet');
    updateURL();
  }

  function syncSheetFav() {
    const btn = document.getElementById('sheet-fav');
    if (!btn) return;
    const on = STATE.currentEvent && isFavorite(STATE.currentEvent);
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    btn.style.display = STATE.currentEvent ? '' : 'none';
    const svg = btn.querySelector('svg');
    if (svg) svg.setAttribute('fill', on ? 'currentColor' : 'none');
  }

  /* ---------- Event wiring ---------- */
  function wire() {
    // View tabs (also carry the optional date-range quick filter)
    document.querySelectorAll('.view-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        STATE.view = btn.dataset.view;
        STATE.range = btn.dataset.range || '';
        syncViewTabs();
        render();
      });
    });

    // Today button — jumps to today in the current grid (Month or Week)
    document.getElementById('btn-today').addEventListener('click', () => {
      STATE.calCursor = new Date();
      if (STATE.view !== 'calendar' && STATE.view !== 'week') {
        STATE.view = 'calendar';
        STATE.range = '';
        syncViewTabs();
      }
      render();
    });

    // Filter drawer open
    document.getElementById('btn-filter').addEventListener('click', () => {
      syncChipStates();
      openOverlay('drawer');
    });

    // Scrim closes drawer/sheet
    document.getElementById('scrim').addEventListener('click', closeSheet);
    document.getElementById('sheet-close').addEventListener('click', closeSheet);
    document.getElementById('sheet-share').addEventListener('click', shareCurrentEvent);
    document.getElementById('sheet-fav').addEventListener('click', () => {
      if (!STATE.currentEvent) return;
      toggleFavorite(STATE.currentEvent.id);
      syncSheetFav();
      render();
    });

    // Filter drawer: changes are live-applied on chip click; Done just closes
    document.getElementById('btn-apply').addEventListener('click', () => {
      closeOverlay('drawer');
      document.getElementById('scrim').classList.remove('open');
    });
    document.getElementById('btn-clear').addEventListener('click', () => {
      STATE.filters = { categories: [], formats: [], languages: [], statuses: [] };
      syncChipStates();
      updateFilterBadge();
      render();
    });

    // Escape key closes overlays
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSheet(); });

    // Search
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    searchInput.addEventListener('input', () => {
      STATE.search = searchInput.value;
      searchClear.classList.toggle('show', searchInput.value.length > 0);
      render();
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      STATE.search = '';
      searchClear.classList.remove('show');
      render();
      searchInput.focus();
    });

    // Main content: tap delegation + swipe gestures for month/week navigation
    const mainEl = document.getElementById('main');
    const handleCalCell = (cell) => {
      const [y, m, d] = cell.dataset.date.split('-').map(Number);
      openDaySheet(new Date(y, m, d));
    };

    const SWIPE_MIN = 60, SWIPE_MAX_MS = 600, SWIPE_VERT_TOLERANCE = 0.5;
    let touch = null;
    mainEl.addEventListener('touchstart', (ev) => {
      if (ev.touches.length !== 1) { touch = null; return; }
      const t = ev.touches[0];
      touch = { x: t.clientX, y: t.clientY, at: Date.now() };
    }, { passive: true });
    mainEl.addEventListener('touchend', (ev) => {
      if (!touch) return;
      const t = ev.changedTouches[0];
      const dx = t.clientX - touch.x;
      const dy = t.clientY - touch.y;
      const dt = Date.now() - touch.at;
      touch = null;
      if (dt > SWIPE_MAX_MS) return;
      if (Math.abs(dx) < SWIPE_MIN) return;
      if (Math.abs(dy) > Math.abs(dx) * SWIPE_VERT_TOLERANCE) return;
      if (STATE.view === 'calendar') stepMonth(dx < 0 ? 1 : -1);
      else if (STATE.view === 'week') stepWeek(dx < 0 ? 1 : -1);
    }, { passive: true });

    mainEl.addEventListener('click', (ev) => {
      // Star button click shouldn't open the event sheet.
      const fav = ev.target.closest('.fav-btn');
      if (fav) {
        ev.stopPropagation();
        toggleFavorite(fav.dataset.fav);
        render();
        return;
      }
      const card = ev.target.closest('.event-card');
      if (card) { openSheet(card.dataset.id); return; }
      const cell = ev.target.closest('.cal-cell.has-events');
      if (cell) handleCalCell(cell);
    });
    mainEl.addEventListener('keydown', (ev) => {
      if (ev.key !== 'Enter' && ev.key !== ' ') return;
      const cell = ev.target.closest('.cal-cell.has-events');
      if (cell) { ev.preventDefault(); handleCalCell(cell); }
    });

    // Delegate inside the sheet body: copy buttons + day-sheet rows.
    document.getElementById('sheet-body').addEventListener('click', (ev) => {
      const copy = ev.target.closest('.copy-btn');
      if (copy) { ev.preventDefault(); ev.stopPropagation(); copyToClipboard(copy.dataset.copy); return; }
      const row = ev.target.closest('.day-event-row');
      if (row) openSheet(row.dataset.id);
    });
  }

  /* ---------- Init ---------- */
  (async function init() {
    const urlBits = applyURLToState();
    loadFavorites();
    render(); // paint the loading state immediately
    await loadData();
    buildFilters();
    wire();
    // Reflect restored state in the UI
    document.getElementById('search-input').value = STATE.search || '';
    document.getElementById('search-clear').classList.toggle('show', !!STATE.search);
    syncViewTabs();
    render();
    // Open event detail if ?event=ID was in the URL
    if (urlBits.eventId) {
      const e = STATE.events.find(x => String(x.id) === urlBits.eventId);
      if (e) openSheet(e.id);
    } else if (urlBits.dayISO && /^\d{4}-\d{2}-\d{2}$/.test(urlBits.dayISO)) {
      const [y,mo,da] = urlBits.dayISO.split('-').map(Number);
      openDaySheet(new Date(y, mo-1, da));
    }

    // Keep "Now" / "Starts in X min" badges accurate — re-render every minute
    // but skip if a sheet is open so we don't interrupt the user.
    setInterval(() => {
      if (document.getElementById('sheet').classList.contains('open')) return;
      if (document.getElementById('drawer').classList.contains('open')) return;
      if (STATE.loading || STATE.loadError) return;
      render();
    }, 60 * 1000);
  })();
</script>
</body>
