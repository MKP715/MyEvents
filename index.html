<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#2E7D32" />
<title>AA Events Calendar</title>
<style>
  /* ============================================================
     Open-source vanilla CSS. Mobile-first, dark-mode aware.
     ============================================================ */
  :root {
    --bg:           #f5f7fa;
    --surface:      #ffffff;
    --surface-alt:  #f1f5f9;
    --text:         #0f172a;
    --text-muted:   #64748b;
    --border:       #e2e8f0;
    --primary:      #2E7D32;
    --primary-ink:  #ffffff;
    --danger:       #dc2626;
    --warning:      #f59e0b;
    --radius-sm:    8px;
    --radius:       14px;
    --radius-lg:    20px;
    --shadow-sm:    0 1px 2px rgba(15,23,42,.06);
    --shadow:       0 4px 12px rgba(15,23,42,.08);
    --shadow-lg:    0 20px 40px rgba(15,23,42,.18);
    --safe-bottom:  env(safe-area-inset-bottom, 0px);
    --safe-top:     env(safe-area-inset-top, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #0b1220;
      --surface:     #111a2e;
      --surface-alt: #1a2540;
      --text:        #e2e8f0;
      --text-muted:  #94a3b8;
      --border:      #25324f;
      --shadow-sm:   0 1px 2px rgba(0,0,0,.4);
      --shadow:      0 6px 18px rgba(0,0,0,.5);
      --shadow-lg:   0 20px 40px rgba(0,0,0,.6);
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: contain;
  }

  button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  input, select { font: inherit; color: inherit; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ---------- App shell ---------- */
  .app {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-sm);
  }
  .topbar h1 {
    font-size: 1.05rem;
    font-weight: 700;
    margin: 0;
    flex: 1;
    letter-spacing: -0.01em;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .topbar .brand-icon {
    width: 22px; height: 22px;
    color: var(--primary);
    flex-shrink: 0;
  }
  .icon-btn {
    width: 40px; height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    color: var(--text);
    transition: background .15s;
    position: relative;
  }
  .icon-btn:hover, .icon-btn:active { background: var(--surface-alt); }
  .icon-btn svg { width: 22px; height: 22px; }
  .badge {
    position: absolute;
    top: 4px; right: 4px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: 8px;
    background: var(--primary);
    color: var(--primary-ink);
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- View tabs ---------- */
  .view-tabs {
    display: flex;
    gap: 4px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .view-tabs::-webkit-scrollbar { display: none; }
  .view-tabs button {
    padding: 9px 16px;
    min-height: 38px;
    border-radius: 999px;
    background: var(--surface-alt);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.88rem;
    white-space: nowrap;
    transition: background .15s, color .15s;
  }
  .view-tabs button.active {
    background: var(--primary);
    color: var(--primary-ink);
  }

  /* ---------- Main ---------- */
  main {
    flex: 1;
    padding: 14px 12px;
    padding-bottom: calc(40px + var(--safe-bottom));
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
  }

  /* ---------- Agenda / list view ---------- */
  .agenda { display: flex; flex-direction: column; gap: 18px; }
  .agenda-group h2 {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 0 4px 8px;
  }
  .event-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 14px 14px 18px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    position: relative;
    display: flex;
    gap: 12px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .event-card:active { transform: scale(0.985); }
  .event-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--event-color, var(--primary));
  }
  .event-date {
    flex-shrink: 0;
    width: 50px;
    text-align: center;
    padding-top: 2px;
  }
  .event-date .mon {
    font-size: 0.68rem;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--event-color, var(--primary));
  }
  .event-date .day {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
    margin-top: 2px;
  }
  .event-date .recurring-icon {
    font-size: 1.3rem;
    color: var(--event-color, var(--primary));
  }
  .event-body { flex: 1; min-width: 0; }
  .event-title {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 4px;
    color: var(--text);
  }
  .event-meta {
    font-size: 0.82rem;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    align-items: center;
  }
  .event-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .event-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--surface-alt);
    color: var(--text-muted);
  }
  .tag.cat {
    background: var(--event-color, var(--primary));
    color: #fff;
    opacity: 0.92;
  }
  .tag.tentative { background: rgba(245,158,11,.15); color: var(--warning); }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.4; margin-bottom: 12px; }

  /* ---------- Month calendar view ---------- */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 4px 10px;
    gap: 6px;
  }
  .cal-nav h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin: 0;
    text-align: center;
    flex: 1;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    background: var(--surface);
    padding: 6px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .cal-dow {
    font-size: 0.65rem;
    font-weight: 700;
    text-align: center;
    padding: 4px 0 6px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cal-cell {
    min-height: 70px;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    padding: 3px 3px 4px;
    font-size: 0.7rem;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border: 1px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .cal-cell.other-month { opacity: 0.4; }
  .cal-cell .cal-num {
    font-weight: 700;
    font-size: 0.78rem;
    line-height: 1;
    padding: 2px 2px 0;
    color: var(--text);
  }
  .cal-cell.today .cal-num {
    background: var(--primary);
    color: #fff;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    margin: -1px 0 1px;
    font-size: 0.72rem;
  }
  .cal-cell.has-events:hover,
  .cal-cell.has-events:active { background: var(--border); }
  .cal-cell:focus-visible { outline: 2px solid var(--primary); outline-offset: -1px; }
  .cal-events {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 1px;
    overflow: hidden;
  }
  .cal-event-pill {
    background: var(--event-color, var(--primary));
    color: #fff;
    font-size: 0.62rem;
    padding: 1px 4px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
    line-height: 1.3;
    pointer-events: none;
  }
  .cal-event-pill.tentative {
    background: transparent;
    color: var(--event-color, var(--primary));
    border: 1px dashed var(--event-color, var(--primary));
  }
  .cal-event-more {
    font-size: 0.6rem;
    color: var(--text-muted);
    font-weight: 700;
    padding-left: 3px;
    line-height: 1.1;
    pointer-events: none;
  }
  /* Tiny screens: pills collapse to color bars (saves space) */
  @media (max-width: 430px) {
    .cal-cell { min-height: 58px; padding: 2px 2px 3px; }
    .cal-event-pill {
      height: 4px;
      padding: 0;
      font-size: 0;
      border-radius: 2px;
      border: none;
    }
    .cal-event-pill.tentative { background: var(--event-color, var(--primary)); opacity: 0.5; }
  }

  /* ---------- Day list (inside sheet) ---------- */
  .day-event-list { display: flex; flex-direction: column; }
  .day-event-row {
    display: flex;
    align-items: stretch;
    gap: 12px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
    width: 100%;
    text-align: left;
    cursor: pointer;
    background: none;
    transition: background .12s;
    border-left: none;
    border-right: none;
    border-top: none;
  }
  .day-event-row:last-child { border-bottom: none; }
  .day-event-row:hover { background: var(--surface-alt); }
  .day-event-row .dot-bar {
    width: 4px;
    border-radius: 2px;
    flex-shrink: 0;
    background: var(--event-color, var(--primary));
  }
  .day-event-row .day-event-body { flex: 1; min-width: 0; }
  .day-event-row .day-event-title {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 3px;
    color: var(--text);
    word-break: break-word;
  }
  .day-event-row .day-event-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
  }
  .day-event-row .day-event-chev {
    width: 18px; height: 18px;
    color: var(--text-muted);
    flex-shrink: 0;
    align-self: center;
  }
  .day-empty {
    padding: 32px 20px;
    text-align: center;
    color: var(--text-muted);
  }

  /* ---------- Filter drawer ---------- */
  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-height: 85vh;
    background: var(--surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    z-index: 60;
    transform: translateY(100%);
    transition: transform .25s ease-out, visibility 0s linear .25s;
    padding: 16px 16px calc(16px + var(--safe-bottom));
    box-shadow: var(--shadow-lg);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
    visibility: hidden;
  }
  .drawer.open { transform: translateY(0); visibility: visible; transition: transform .25s ease-out; }
  .drawer .handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 8px;
  }
  .drawer h3 {
    font-size: 1.15rem;
    margin: 0 0 4px;
  }

  .filter-group h4 {
    font-size: 0.78rem;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 8px;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 7px 12px;
    border-radius: 999px;
    background: var(--surface-alt);
    color: var(--text);
    font-size: 0.85rem;
    font-weight: 500;
    border: 1.5px solid transparent;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip.active {
    background: var(--primary);
    color: var(--primary-ink);
    border-color: var(--primary);
  }
  .chip .swatch {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--swatch, var(--primary));
  }
  .chip.active .swatch { background: #fff; }

  .drawer-actions {
    display: flex;
    gap: 10px;
    padding-top: 8px;
    position: sticky;
    bottom: 0;
    background: var(--surface);
    padding-bottom: 4px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.95rem;
    transition: filter .15s;
  }
  .btn-primary { background: var(--primary); color: var(--primary-ink); }
  .btn-ghost { background: var(--surface-alt); color: var(--text); }
  .btn:hover { filter: brightness(1.05); }

  /* ---------- Event detail sheet ---------- */
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-height: 92vh;
    background: var(--surface);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    z-index: 60;
    transform: translateY(100%);
    transition: transform .25s ease-out, visibility 0s linear .25s;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    visibility: hidden;
  }
  .sheet.open { transform: translateY(0); visibility: visible; transition: transform .25s ease-out; }
  .sheet-header {
    padding: 18px 18px 14px;
    background: var(--event-color, var(--primary));
    color: #fff;
    position: relative;
  }
  .sheet-header .handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,.5);
    border-radius: 2px;
    margin: 0 auto 10px;
  }
  .sheet-header h3 {
    font-size: 1.2rem;
    margin: 0 90px 6px 0;
    font-weight: 700;
    min-height: 1.4em;
  }
  .sheet-header .sub {
    font-size: 0.85rem;
    opacity: 0.9;
    margin-right: 90px;
  }
  .sheet-actions {
    position: absolute;
    top: 14px; right: 12px;
    display: flex;
    gap: 6px;
  }
  .sheet-actions button {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
  }
  .sheet-actions button:hover,
  .sheet-actions button:active { background: rgba(255,255,255,.35); }
  .sheet-actions svg { width: 18px; height: 18px; }
  .sheet-footer {
    padding: 12px 16px calc(14px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 8px;
  }
  .sheet-footer .btn {
    padding: 11px;
    font-size: 0.9rem;
  }
  /* Toast */
  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(28px + var(--safe-bottom));
    transform: translateX(-50%) translateY(20px);
    background: #0f172a;
    color: #fff;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    max-width: 90vw;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .sheet-body {
    padding: 16px 18px calc(18px + var(--safe-bottom));
    overflow-y: auto;
    flex: 1;
  }
  .detail-row {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.92rem;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .lbl {
    flex-shrink: 0;
    width: 80px;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding-top: 2px;
  }
  .detail-row .val { flex: 1; word-break: break-word; }
  .detail-row .val a { word-break: break-all; }

  /* ---------- Desktop adjustments ---------- */
  @media (min-width: 720px) {
    main { padding: 24px; }
    .topbar { padding-left: 24px; padding-right: 24px; }
    .topbar h1 { font-size: 1.25rem; }
    .view-tabs { padding-left: 24px; padding-right: 24px; }
    .agenda { flex-direction: row; flex-wrap: wrap; align-items: flex-start; }
    .agenda-group { flex: 1 1 320px; min-width: 320px; }
    .cal-grid { padding: 8px; gap: 4px; }
    .cal-dow { font-size: 0.75rem; padding: 8px 0; }
    .cal-cell { min-height: 110px; font-size: 0.82rem; padding: 5px 6px 6px; }
    .cal-cell .cal-num { font-size: 0.95rem; padding: 3px 2px 0; }
    .cal-cell.today .cal-num { width: 26px; height: 26px; font-size: 0.85rem; }
    .cal-event-pill { font-size: 0.72rem; padding: 2px 6px; border-radius: 4px; }
    .cal-event-more { font-size: 0.7rem; }
  }

  @media (min-width: 960px) {
    .drawer {
      max-width: 440px;
      right: auto;
      border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
      max-height: 100vh;
      height: 100%;
      transform: translateX(-100%);
    }
    .drawer.open { transform: translateX(0); }
    .sheet {
      max-width: 560px;
      left: 50%;
      bottom: 50%;
      transform: translate(-50%, 120%);
      border-radius: var(--radius-lg);
      max-height: 80vh;
    }
    .sheet.open { transform: translate(-50%, 50%); }
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <h1>
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      AA Events
    </h1>
    <button type="button" class="icon-btn" id="btn-today" title="Jump to today" aria-label="Today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </button>
    <button type="button" class="icon-btn" id="btn-filter" title="Filters" aria-label="Filters">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      <span class="badge" id="filter-badge" hidden>0</span>
    </button>
  </header>

  <nav class="view-tabs" role="tablist">
    <button type="button" role="tab" data-view="calendar" class="active">Calendar</button>
    <button type="button" role="tab" data-view="upcoming">Upcoming</button>
    <button type="button" role="tab" data-view="recurring">Recurring</button>
    <button type="button" role="tab" data-view="all">All</button>
  </nav>

  <main id="main"></main>

</div>

<!-- Filter drawer -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true" inert>
  <div class="handle"></div>
  <h3>Filters</h3>

  <div class="filter-group">
    <h4>Category</h4>
    <div class="chip-row" id="filter-categories"></div>
  </div>

  <div class="filter-group">
    <h4>Format</h4>
    <div class="chip-row" id="filter-formats"></div>
  </div>

  <div class="filter-group">
    <h4>Language</h4>
    <div class="chip-row" id="filter-languages"></div>
  </div>

  <div class="filter-group">
    <h4>Status</h4>
    <div class="chip-row" id="filter-statuses"></div>
  </div>

  <div class="drawer-actions">
    <button type="button" class="btn btn-ghost" id="btn-clear">Clear all</button>
    <button type="button" class="btn btn-primary" id="btn-apply">Done</button>
  </div>
</aside>

<!-- Event detail sheet -->
<aside class="sheet" id="sheet" aria-hidden="true" inert>
  <div class="sheet-header" id="sheet-head">
    <div class="handle"></div>
    <div class="sheet-actions">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <button type="button" id="sheet-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
  /* ---------- Data loading ---------- */
  const CSV_URL_B64 = 'aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvZS8yUEFDWC0xdlRiRVF2TWJsYlFjdWcyaGVIMF9sMjRnYXlhSWRWV0hZVVNkLS1NUGFOOEd4dXpPYmNTV3gyNXFHNkEzUlNGS0VzVUFnMGY0S2JER1BUUi9wdWI/Z2lkPTczMzQzNDc5NCZzaW5nbGU9dHJ1ZSZvdXRwdXQ9Y3N2';
  const CSV_URL = atob(CSV_URL_B64);

  /* Category palette — single source of truth.
     Override or extend here to retheme the whole calendar. */
  const CATEGORIES = [
    { name: 'Assembly',         color: '#6A1B9A', description: 'Area assemblies (Spring/Summer/Fall)' },
    { name: 'Workshop',         color: '#1976D2', description: 'GV / Grapevine workshops' },
    { name: 'Conference',       color: '#C62828', description: 'Multi-day conferences' },
    { name: 'Convention',       color: '#B71C1C', description: 'State / regional conventions' },
    { name: 'Anniversary',      color: '#F9A825', description: 'Group / area anniversaries' },
    { name: 'Social',           color: '#F57C00', description: 'Parties and social events' },
    { name: 'TownHall',         color: '#00897B', description: 'Town hall / open forum meetings' },
    { name: 'Committee',        color: '#2E7D32', description: 'Committee and chair meetings' },
    { name: 'District',         color: '#1B5E20', description: 'District business meetings' },
    { name: 'Group Conscience', color: '#827717', description: 'Group conscience meetings' },
    { name: 'Community',        color: '#5E35B1', description: 'Community / citywide gatherings' },
    { name: 'Birthday',         color: '#D81B60', description: 'Group birthday celebrations' },
    { name: 'Training',         color: '#0277BD', description: 'Bootcamps and trainings' },
    { name: 'Roundup',          color: '#4527A0', description: 'Roundups' },
  ];
  const CATEGORY_COLOR = Object.fromEntries(CATEGORIES.map(c => [c.name, c.color]));
  const DEFAULT_COLOR = '#2E7D32';
  const colorFor = (cat) => CATEGORY_COLOR[cat] || DEFAULT_COLOR;

  const STATE = {
    events: [],
    view: 'calendar',
    calCursor: new Date(),
    filters: { categories: [], formats: [], languages: [], statuses: [] },
    currentEvent: null,
  };

  function parseCSV(text) {
    const rows = [];
    let field = '';
    let row = [];
    let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i+1] === '"') { field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n' || c === '\r') {
          if (field !== '' || row.length) { row.push(field); rows.push(row); row = []; field = ''; }
          if (c === '\r' && text[i+1] === '\n') i++;
        } else field += c;
      }
    }
    if (field !== '' || row.length) { row.push(field); rows.push(row); }
    if (!rows.length) return [];
    const headers = rows.shift();
    return rows.filter(r => r.some(v => v !== '')).map(r => {
      const o = {};
      headers.forEach((h, i) => o[h.trim()] = (r[i] ?? '').trim());
      return o;
    });
  }

  async function loadData() {
    try {
      const res = await fetch(CSV_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const parsed = parseCSV(text).map(e => {
        const recurring = String(e.recurring || '').toLowerCase() === 'true' ? 'true' : 'false';
        const all_day  = String(e.all_day  || '').toLowerCase() === 'true' ? 'true' : 'false';
        return { ...e, recurring, all_day, _start: toDate(e.start_date, e.start_time) };
      });
      const occurrences = expandRecurring(parsed);
      STATE.events = [...parsed, ...occurrences];
    } catch (err) {
      document.getElementById('main').innerHTML =
        `<div class="empty-state">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>
           <p><strong>Unable to load meetings.csv</strong></p>
           <p>${err.message}</p>
           <p style="margin-top:10px; font-size:.85rem">If opening from disk, run a local server:<br/>
           <code>python -m http.server</code></p>
         </div>`;
      throw err;
    }
  }

  /* ---------- Helpers ---------- */
  function toDate(d, t) {
    if (!d) return null;
    const [y, m, day] = d.split('-').map(Number);
    const [hh = 0, mm = 0] = (t || '00:00').split(':').map(Number);
    return new Date(y, m-1, day, hh, mm);
  }
  function fmtISO(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  /* ---------- Recurring event expansion ----------
     Generates concrete instances of recurring events for the next 12 months
     so they appear on the calendar and in Upcoming alongside dated events.
     The original "template" row stays in STATE so the Recurring tab keeps
     showing the pattern (e.g. "Second Sunday of every month"). */
  const ORDINALS = { first: 0, second: 1, third: 2, fourth: 3, fifth: 4, last: -1 };
  const DAYS_OF_WEEK = { sunday: 0, monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5, saturday: 6 };
  function nthWeekdayOfMonth(year, month, dow, nth) {
    if (nth === -1) {
      const lastDay = new Date(year, month + 1, 0);
      const diff = (lastDay.getDay() - dow + 7) % 7;
      return new Date(year, month, lastDay.getDate() - diff);
    }
    const first = new Date(year, month, 1);
    const diff = (dow - first.getDay() + 7) % 7;
    const day = 1 + diff + nth * 7;
    const maxDay = new Date(year, month + 1, 0).getDate();
    return day > maxDay ? null : new Date(year, month, day);
  }
  function parseRecurrencePattern(pattern) {
    const p = (pattern || '').toLowerCase();
    const m = p.match(/(first|second|third|fourth|fifth|last)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)/);
    if (!m) return null;
    return { nth: ORDINALS[m[1]], dow: DAYS_OF_WEEK[m[2]] };
  }
  function expandRecurring(events) {
    const today = startOfDay(new Date());
    const horizon = new Date(today); horizon.setFullYear(horizon.getFullYear() + 1);
    const instances = [];
    events.filter(e => e.recurring === 'true').forEach(e => {
      const rule = parseRecurrencePattern(e.recurrence_pattern);
      if (!rule) return;
      const [sh = 0, sm = 0] = (e.start_time || '00:00').split(':').map(Number);
      const [eh, em] = (e.end_time || '').split(':').map(Number);
      const cursor = new Date(today.getFullYear(), today.getMonth(), 1);
      while (cursor <= horizon) {
        const d = nthWeekdayOfMonth(cursor.getFullYear(), cursor.getMonth(), rule.dow, rule.nth);
        if (d) {
          const start = new Date(d); start.setHours(sh, sm, 0, 0);
          if (start >= today && start <= horizon) {
            const iso = fmtISO(start);
            instances.push({
              ...e,
              id: `${e.id}-${iso}`,
              recurring: 'false',
              _recurring_origin: e.id,
              start_date: iso,
              end_date: iso,
              end_time: (e.end_time || ''),
              _start: start,
            });
          }
        }
        cursor.setMonth(cursor.getMonth() + 1);
      }
    });
    return instances;
  }

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  function fmtTime(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const p = h >= 12 ? 'pm' : 'am';
    const h12 = ((h + 11) % 12) + 1;
    return m ? `${h12}:${String(m).padStart(2,'0')} ${p}` : `${h12}${p}`;
  }
  function fmtDateRange(e) {
    if (e.recurring === 'true') return e.recurrence_pattern || 'Recurring';
    const s = toDate(e.start_date, e.start_time);
    const en = toDate(e.end_date, e.end_time);
    if (!s) return '';
    const sStr = `${MONTHS[s.getMonth()]} ${s.getDate()}`;
    if (en && (en.toDateString() !== s.toDateString())) {
      return `${sStr} – ${MONTHS[en.getMonth()]} ${en.getDate()}`;
    }
    const times = [e.start_time && fmtTime(e.start_time), e.end_time && fmtTime(e.end_time)].filter(Boolean).join(' – ');
    return times ? `${sStr} · ${times}` : sStr;
  }
  function uniq(arr) { return [...new Set(arr.filter(Boolean))]; }
  const FORMAT_ICONS = {
    'In-Person': '📍',
    'Virtual':   '💻',
    'Hybrid':    '🔀',
  };
  const LANG_LABEL = {
    'English': 'EN',
    'Spanish': 'ES',
    'Both':    'EN/ES',
  };

  /* ---------- Filtering ---------- */
  function eventPassesFilters(e) {
    const f = STATE.filters;
    if (f.categories.length && !f.categories.includes(e.category)) return false;
    if (f.formats.length    && !f.formats.includes(e.format))     return false;
    if (f.languages.length  && !f.languages.includes(e.language)) return false;
    if (f.statuses.length   && !f.statuses.includes(e.status))    return false;
    return true;
  }
  function activeFilterCount() {
    return Object.values(STATE.filters).reduce((n, a) => n + a.length, 0);
  }

  /* ---------- Rendering ---------- */
  function render() {
    const main = document.getElementById('main');
    const filtered = STATE.events.filter(eventPassesFilters);
    if (STATE.view === 'calendar') return renderCalendar(main, filtered);
    if (STATE.view === 'recurring') return renderList(main, filtered.filter(e => e.recurring === 'true'), 'recurring');
    if (STATE.view === 'all')       return renderList(main, filtered, 'all');
    return renderList(main, filtered.filter(e => e.recurring !== 'true' && e._start && e._start >= startOfDay(new Date())), 'upcoming');
  }

  function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }

  function renderList(main, events, mode) {
    if (!events.length) {
      main.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <p>No events match your filters.</p></div>`;
      return;
    }

    if (mode === 'recurring') {
      main.innerHTML = `<div class="agenda"><div class="agenda-group"><h2>Recurring meetings</h2>${events.map(eventCard).join('')}</div></div>`;
      return;
    }

    // Group dated events by month
    const dated = events.filter(e => e._start).sort((a,b) => a._start - b._start);
    const recurring = events.filter(e => e.recurring === 'true');
    const groups = {};
    dated.forEach(e => {
      const key = `${e._start.getFullYear()}-${String(e._start.getMonth()).padStart(2,'0')}`;
      const label = `${MONTHS[e._start.getMonth()]} ${e._start.getFullYear()}`;
      (groups[key] ??= { label, items: [] }).items.push(e);
    });

    const groupHTML = Object.values(groups).map(g =>
      `<div class="agenda-group"><h2>${g.label}</h2>${g.items.map(eventCard).join('')}</div>`
    ).join('');

    const recurHTML = (mode === 'all' && recurring.length)
      ? `<div class="agenda-group"><h2>Recurring</h2>${recurring.map(eventCard).join('')}</div>`
      : '';

    main.innerHTML = `<div class="agenda">${groupHTML}${recurHTML}</div>`;
  }

  function eventCard(e) {
    const color = colorFor(e.category);
    const datePart = e.recurring === 'true'
      ? `<div class="recurring-icon">↻</div><div class="mon" style="margin-top:2px">${(e.recurrence_pattern||'').split(' ')[0] || 'Every'}</div>`
      : (e._start
          ? `<div class="mon">${MONTHS[e._start.getMonth()]}</div><div class="day">${e._start.getDate()}</div>`
          : `<div class="mon">TBD</div>`);
    const when = fmtDateRange(e);
    const loc = e.format === 'Virtual'
      ? 'Online'
      : [e.venue_name, e.city].filter(Boolean).join(', ');
    const tags = [
      `<span class="tag cat">${escapeHtml(e.category || '')}</span>`,
      e._recurring_origin ? `<span class="tag">↻ Recurring</span>` : '',
      e.format ? `<span class="tag">${FORMAT_ICONS[e.format]||''} ${e.format}</span>` : '',
      e.language ? `<span class="tag">${LANG_LABEL[e.language]||e.language}</span>` : '',
      e.status === 'Tentative' ? `<span class="tag tentative">Tentative</span>` : '',
      e.cost ? `<span class="tag">${escapeHtml(e.cost)}</span>` : '',
    ].filter(Boolean).join('');

    return `
      <article class="event-card" data-id="${e.id}" style="--event-color:${color}">
        <div class="event-date">${datePart}</div>
        <div class="event-body">
          <div class="event-title">${escapeHtml(e.title)}</div>
          <div class="event-meta">
            <span>🕒 ${escapeHtml(when)}</span>
            ${loc ? `<span>📍 ${escapeHtml(loc)}</span>` : ''}
          </div>
          <div class="event-tags">${tags}</div>
        </div>
      </article>`;
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderCalendar(main, events) {
    const cursor = STATE.calCursor;
    const y = cursor.getFullYear(), m = cursor.getMonth();
    const first = new Date(y, m, 1);
    const startOffset = first.getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const today = startOfDay(new Date());

    // Bucket events by yyyy-mm-dd (including multi-day spans)
    const byDate = {};
    events.forEach(e => {
      if (e.recurring === 'true') return;
      const s = toDate(e.start_date, e.start_time);
      if (!s) return;
      const en = toDate(e.end_date, e.end_time) || s;
      const d = new Date(s); d.setHours(0,0,0,0);
      const endD = new Date(en); endD.setHours(0,0,0,0);
      while (d <= endD) {
        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        (byDate[key] ??= []).push(e);
        d.setDate(d.getDate() + 1);
      }
    });

    // Desktop shows up to 3 title pills; mobile (via CSS) collapses them to color bars.
    const MAX_PILLS = 3;
    const buildPills = (items) => {
      const pills = items.slice(0, MAX_PILLS).map(e => {
        const color = colorFor(e.category);
        const cls = e.status === 'Tentative' ? 'cal-event-pill tentative' : 'cal-event-pill';
        return `<div class="${cls}" style="--event-color:${color}" title="${escapeHtml(e.title)}">${escapeHtml(e.title)}</div>`;
      }).join('');
      const more = items.length > MAX_PILLS ? `<div class="cal-event-more">+${items.length - MAX_PILLS} more</div>` : '';
      return pills + more;
    };

    let cellsHTML = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
    const prevDays = new Date(y, m, 0).getDate();
    for (let i = startOffset - 1; i >= 0; i--) {
      cellsHTML += `<div class="cal-cell other-month"><div class="cal-num">${prevDays - i}</div></div>`;
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const key = `${y}-${m}-${day}`;
      const todays = (byDate[key] || []).slice().sort((a,b) => (a._start || 0) - (b._start || 0));
      const date = new Date(y, m, day);
      const isToday = date.getTime() === today.getTime();
      cellsHTML += `<div class="cal-cell ${todays.length?'has-events':''} ${isToday?'today':''}" data-date="${key}" role="button" tabindex="0">
        <div class="cal-num">${day}</div>
        <div class="cal-events">${buildPills(todays)}</div>
      </div>`;
    }
    const totalCells = startOffset + daysInMonth;
    const trail = (7 - (totalCells % 7)) % 7;
    for (let i = 1; i <= trail; i++) {
      cellsHTML += `<div class="cal-cell other-month"><div class="cal-num">${i}</div></div>`;
    }

    // Agenda under the calendar: events in the visible month
    const monthEvents = [];
    for (let day = 1; day <= daysInMonth; day++) {
      const todays = byDate[`${y}-${m}-${day}`] || [];
      todays.forEach(e => { if (!monthEvents.includes(e)) monthEvents.push(e); });
    }
    monthEvents.sort((a,b) => a._start - b._start);

    main.innerHTML = `
      <div class="cal-nav">
        <button type="button" class="icon-btn" id="cal-prev" aria-label="Previous month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <h2>${MONTHS[m]} ${y}</h2>
        <button type="button" class="icon-btn" id="cal-next" aria-label="Next month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="cal-grid">${cellsHTML}</div>
      <div style="margin-top:16px" class="agenda">
        ${monthEvents.length
            ? `<div class="agenda-group"><h2>This month</h2>${monthEvents.map(eventCard).join('')}</div>`
            : `<div class="empty-state">No events this month.</div>`}
      </div>`;

    document.getElementById('cal-prev').onclick = () => { STATE.calCursor = new Date(y, m-1, 1); render(); };
    document.getElementById('cal-next').onclick = () => { STATE.calCursor = new Date(y, m+1, 1); render(); };
  }

  /* ---------- Filter drawer UI ---------- */
  function buildFilters() {
    const inUse = new Set(STATE.events.map(e => e.category).filter(Boolean));
    const cats = [
      ...CATEGORIES.filter(c => inUse.has(c.name)),
      ...[...inUse].filter(n => !CATEGORY_COLOR[n]).map(n => ({ name: n, color: DEFAULT_COLOR })),
    ];

    document.getElementById('filter-categories').innerHTML = cats.map(c =>
      `<button type="button" class="chip" data-group="categories" data-val="${escapeHtml(c.name)}" style="--swatch:${c.color}"><span class="swatch"></span>${escapeHtml(c.name)}</button>`
    ).join('');
    document.getElementById('filter-formats').innerHTML = uniq(STATE.events.map(e => e.format)).map(v =>
      `<button type="button" class="chip" data-group="formats" data-val="${escapeHtml(v)}">${FORMAT_ICONS[v]||''} ${escapeHtml(v)}</button>`
    ).join('');
    document.getElementById('filter-languages').innerHTML = uniq(STATE.events.map(e => e.language)).map(v =>
      `<button type="button" class="chip" data-group="languages" data-val="${escapeHtml(v)}">${escapeHtml(v)}</button>`
    ).join('');
    document.getElementById('filter-statuses').innerHTML = uniq(STATE.events.map(e => e.status)).map(v =>
      `<button type="button" class="chip" data-group="statuses" data-val="${escapeHtml(v)}">${escapeHtml(v)}</button>`
    ).join('');

    document.querySelectorAll('.drawer .chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const g = btn.dataset.group, v = btn.dataset.val;
        const list = STATE.filters[g];
        const i = list.indexOf(v);
        if (i >= 0) list.splice(i, 1); else list.push(v);
        btn.classList.toggle('active');
        updateFilterBadge();
      });
    });
  }

  function updateFilterBadge() {
    const n = activeFilterCount();
    const b = document.getElementById('filter-badge');
    b.textContent = n;
    b.hidden = n === 0;
  }

  function syncChipStates() {
    document.querySelectorAll('.drawer .chip').forEach(btn => {
      const g = btn.dataset.group, v = btn.dataset.val;
      btn.classList.toggle('active', STATE.filters[g].includes(v));
    });
  }

  /* ---------- Overlays ---------- */
  function openOverlay(id) {
    const el = document.getElementById(id);
    el.classList.add('open');
    el.removeAttribute('inert');
    el.setAttribute('aria-hidden', 'false');
    document.getElementById('scrim').classList.add('open');
  }
  function closeOverlay(id) {
    const el = document.getElementById(id);
    el.classList.remove('open');
    el.setAttribute('inert', '');
    el.setAttribute('aria-hidden', 'true');
  }
  function closeSheet() {
    closeOverlay('sheet');
    closeOverlay('drawer');
    document.getElementById('scrim').classList.remove('open');
    STATE.currentEvent = null;
  }

  /* ---------- Toast ---------- */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ---------- Share & add-to-calendar ---------- */
  function buildShareText(e) {
    const addr = [e.venue_name, e.address, [e.city, e.state].filter(Boolean).join(', '), e.zip].filter(Boolean).join(', ');
    const lines = [
      e.title,
      e.category ? `(${e.category})` : '',
      fmtDateRange(e),
      e.format ? `Format: ${e.format}` : '',
      addr,
      e.virtual_link ? `Join: ${e.virtual_link}` : '',
      e.meeting_id ? `Meeting ID: ${e.meeting_id}` : '',
      e.passcode ? `Passcode: ${e.passcode}` : '',
      e.cost ? `Cost: ${e.cost}` : '',
      e.status && e.status !== 'Confirmed' ? `Status: ${e.status}` : '',
      e.source_url ? `Flyer: ${e.source_url}` : '',
      e.notes || '',
    ].filter(Boolean);
    return lines.join('\n');
  }
  async function shareCurrentEvent() {
    const e = STATE.currentEvent;
    if (!e) return;
    const text = buildShareText(e);
    try {
      if (navigator.share) {
        await navigator.share({ title: e.title, text });
      } else {
        await navigator.clipboard.writeText(text);
        showToast('Copied to clipboard');
      }
    } catch (err) {
      if (err && err.name !== 'AbortError') showToast('Could not share');
    }
  }

  function buildICS(e) {
    const dt = d => d ? `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}00` : '';
    const s = toDate(e.start_date, e.start_time);
    const en = toDate(e.end_date || e.start_date, e.end_time || e.start_time) || s;
    const addr = [e.venue_name, e.address, [e.city, e.state].filter(Boolean).join(', '), e.zip].filter(Boolean).join(', ');
    const description = buildShareText(e).replace(/\n/g, '\\n');
    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//AA Events//EN',
      'BEGIN:VEVENT',
      `UID:${e.id}@aa-events`,
      `DTSTAMP:${dt(new Date())}Z`,
      `DTSTART:${dt(s)}`,
      `DTEND:${dt(en)}`,
      `SUMMARY:${(e.title || '').replace(/,/g, '\\,')}`,
      `LOCATION:${addr.replace(/,/g, '\\,')}`,
      `DESCRIPTION:${description.replace(/,/g, '\\,')}`,
      e.source_url ? `URL:${e.source_url}` : '',
      'END:VEVENT',
      'END:VCALENDAR',
    ].filter(Boolean).join('\r\n');
    return ics;
  }
  function downloadICS(e) {
    const blob = new Blob([buildICS(e)], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${(e.title || 'event').replace(/[^a-z0-9]+/gi, '-')}.ics`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  /* ---------- Day sheet (list view when tapping a calendar day) ---------- */
  const DOW_LONG = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  function eventsOnDay(date) {
    const target = startOfDay(date).getTime();
    return STATE.events.filter(e => {
      if (e.recurring === 'true') return false;
      if (!e._start) return false;
      const s = startOfDay(e._start).getTime();
      const en = startOfDay(toDate(e.end_date, e.end_time) || e._start).getTime();
      return target >= s && target <= en;
    }).sort((a,b) => (a._start || 0) - (b._start || 0));
  }
  function openDaySheet(date) {
    const events = eventsOnDay(date);
    if (!events.length) return;
    if (events.length === 1) { openSheet(events[0].id); return; }

    STATE.currentEvent = null;
    document.getElementById('sheet-head').style.setProperty('--event-color', 'var(--primary)');
    document.getElementById('sheet-title').textContent =
      `${DOW_LONG[date.getDay()]}, ${MONTHS[date.getMonth()]} ${date.getDate()}`;
    document.getElementById('sheet-sub').textContent =
      `${events.length} events`;
    document.getElementById('sheet-share').style.display = 'none';

    const rows = events.map(e => {
      const color = colorFor(e.category);
      const time = e.start_time ? fmtTime(e.start_time) : 'All day';
      const endBit = (e.end_time && e.end_date === e.start_date) ? ` – ${fmtTime(e.end_time)}` : '';
      const loc = e.format === 'Virtual'
        ? 'Online'
        : [e.venue_name, e.city].filter(Boolean).join(', ');
      const recurMark = e._recurring_origin ? ' ↻' : '';
      return `<button type="button" class="day-event-row" data-id="${escapeHtml(e.id)}">
        <span class="dot-bar" style="--event-color:${color}"></span>
        <div class="day-event-body">
          <div class="day-event-title">${escapeHtml(e.title)}${recurMark}</div>
          <div class="day-event-meta">
            <span>🕒 ${escapeHtml(time + endBit)}</span>
            ${loc ? `<span>📍 ${escapeHtml(loc)}</span>` : ''}
            ${e.status === 'Tentative' ? `<span class="tag tentative">Tentative</span>` : ''}
          </div>
        </div>
        <svg class="day-event-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>`;
    }).join('');

    document.getElementById('sheet-body').innerHTML = `<div class="day-event-list">${rows}</div>`;
    document.getElementById('sheet-footer').innerHTML = '';

    openOverlay('sheet');
  }

  /* ---------- Detail sheet ---------- */
  function openSheet(id) {
    const e = STATE.events.find(x => x.id === id);
    if (!e) return;
    STATE.currentEvent = e;
    document.getElementById('sheet-share').style.display = '';
    const color = colorFor(e.category);
    document.getElementById('sheet-head').style.setProperty('--event-color', color);
    document.getElementById('sheet-title').textContent = e.title || '(Untitled)';
    const subBits = [e.category, fmtDateRange(e)].filter(Boolean);
    document.getElementById('sheet-sub').textContent = subBits.join(' · ');

    const addressParts = [e.address, [e.city, e.state].filter(Boolean).join(', '), e.zip].filter(Boolean);
    const fullAddress = addressParts.join(' ');
    const venueLabel = [e.venue_name, fullAddress].filter(Boolean).join(' — ');
    const mapsLink = (e.venue_name || fullAddress)
      ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent([e.venue_name, fullAddress].filter(Boolean).join(' '))}" target="_blank" rel="noopener">${escapeHtml(venueLabel)}</a>`
      : '';

    const rows = [
      ['When', e._recurring_origin
          ? `${escapeHtml(fmtDateRange(e))} <span class="tag" style="margin-left:6px">↻ Recurring</span>`
          : (e.recurring === 'true'
              ? escapeHtml(e.recurrence_pattern || 'Recurring')
              : `${escapeHtml(fmtDateRange(e))}${e.all_day === 'true' ? ' (all day)' : ''}`)],
      ['Format', `${FORMAT_ICONS[e.format]||''} ${escapeHtml(e.format || '—')}`],
      ['Language', escapeHtml(e.language || '—')],
      mapsLink ? ['Where', mapsLink] : null,
      e.virtual_link ? ['Join', `<a href="${escapeHtml(e.virtual_link)}" target="_blank" rel="noopener">${escapeHtml(e.virtual_platform || 'Open link')}</a>`]
                     : (e.virtual_platform ? ['Platform', escapeHtml(e.virtual_platform)] : null),
      e.meeting_id ? ['Meeting ID', escapeHtml(e.meeting_id)] : null,
      e.passcode   ? ['Passcode', escapeHtml(e.passcode)] : null,
      e.cost       ? ['Cost', escapeHtml(e.cost)] : null,
      e.status     ? ['Status', escapeHtml(e.status)] : null,
      e.source_url ? ['Flyer', `<a href="${escapeHtml(e.source_url)}" target="_blank" rel="noopener">Open flyer / link</a>`] : null,
      e.notes      ? ['Notes', escapeHtml(e.notes)] : null,
    ].filter(Boolean);

    document.getElementById('sheet-body').innerHTML = rows.map(([l,v]) =>
      `<div class="detail-row"><div class="lbl">${l}</div><div class="val">${v}</div></div>`
    ).join('');

    const showICS = !!e._start;
    document.getElementById('sheet-footer').innerHTML = `
      ${showICS ? '<button type="button" class="btn btn-ghost" id="btn-ics">Add to calendar</button>' : ''}
      <button type="button" class="btn btn-primary" id="btn-share-footer">Share</button>
    `;
    if (showICS) {
      document.getElementById('btn-ics').addEventListener('click', () => downloadICS(e));
    }
    document.getElementById('btn-share-footer').addEventListener('click', shareCurrentEvent);

    openOverlay('sheet');
  }

  /* ---------- Event wiring ---------- */
  function wire() {
    // View tabs
    document.querySelectorAll('.view-tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        STATE.view = btn.dataset.view;
        render();
      });
    });

    // Today button — jumps to today's month in the Calendar view
    document.getElementById('btn-today').addEventListener('click', () => {
      STATE.calCursor = new Date();
      STATE.view = 'calendar';
      document.querySelectorAll('.view-tabs button').forEach(b =>
        b.classList.toggle('active', b.dataset.view === 'calendar'));
      render();
    });

    // Filter drawer open
    document.getElementById('btn-filter').addEventListener('click', () => {
      syncChipStates();
      openOverlay('drawer');
    });

    // Scrim closes drawer/sheet
    document.getElementById('scrim').addEventListener('click', closeSheet);
    document.getElementById('sheet-close').addEventListener('click', closeSheet);
    document.getElementById('sheet-share').addEventListener('click', shareCurrentEvent);

    // Filter apply/clear
    document.getElementById('btn-apply').addEventListener('click', () => {
      closeOverlay('drawer');
      document.getElementById('scrim').classList.remove('open');
      render();
    });
    document.getElementById('btn-clear').addEventListener('click', () => {
      STATE.filters = { categories: [], formats: [], languages: [], statuses: [] };
      syncChipStates();
      updateFilterBadge();
      render();
    });

    // Escape key closes overlays
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSheet(); });

    // Delegate: event card / calendar cell taps
    const mainEl = document.getElementById('main');
    const handleCalCell = (cell) => {
      const [y, m, d] = cell.dataset.date.split('-').map(Number);
      openDaySheet(new Date(y, m, d));
    };
    mainEl.addEventListener('click', (ev) => {
      const card = ev.target.closest('.event-card');
      if (card) { openSheet(card.dataset.id); return; }
      const cell = ev.target.closest('.cal-cell.has-events');
      if (cell) handleCalCell(cell);
    });
    mainEl.addEventListener('keydown', (ev) => {
      if (ev.key !== 'Enter' && ev.key !== ' ') return;
      const cell = ev.target.closest('.cal-cell.has-events');
      if (cell) { ev.preventDefault(); handleCalCell(cell); }
    });

    // Delegate: tapping an event row inside the day sheet opens its detail
    document.getElementById('sheet-body').addEventListener('click', (ev) => {
      const row = ev.target.closest('.day-event-row');
      if (row) openSheet(row.dataset.id);
    });
  }

  /* ---------- Init ---------- */
  (async function init() {
    await loadData();
    buildFilters();
    wire();
    render();
  })();
</script>
</body>
</html>
